upstream frontend_pc {
    server frontend-pc:4099;
}

upstream frontend_h5 {
    server frontend-h5:4098;
}

upstream frontend_admin {
    server frontend-admin:4097;
}

upstream backend {
    server backend:8000;
}

upstream channel_gateway {
    server channel-gateway:8200;
}

# ===== PC端 — 公开官网 (port 80) =====
server {
    listen 80 default_server;
    server_name localhost;
    client_max_body_size 100M;

    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Trusted Portal Context: always overwrite any client-supplied
        # X-Portal-Key so external requests can never forge the portal.
        proxy_set_header X-Portal-Key "aislos";
    }

    location /webhooks/ {
        proxy_pass http://channel_gateway;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://frontend_pc;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# ===== Cebu Procurement Portal (port 80, hostname-based) =====
# Same shared workspace codebase, different brand and Portal Policy.
# The gateway resolves the portal from hostname and injects the trusted
# X-Portal-Key; the backend never trusts a browser-supplied value.
server {
    listen 80;
    server_name cebu.localhost cebu.local;
    client_max_body_size 100M;

    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Trusted Portal Context: always overwrite any client-supplied
        # X-Portal-Key so external requests can never forge the portal.
        proxy_set_header X-Portal-Key "cebu";
    }

    location / {
        proxy_pass http://frontend_pc;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
