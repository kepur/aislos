services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ainerwise}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ainerwise_dev_2024}
      POSTGRES_DB: ${POSTGRES_DB:-ainerwise}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ainerwise}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-ainerwise_redis_dev} --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-ainerwise_redis_dev}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-ainerwise}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-ainerwise_minio_dev}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      - PYTHONPATH=/app
    command: >
      sh -c "cd /app && alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    environment:
      - PYTHONPATH=/app
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app worker --loglevel=info -Q default,ai_ingestion,automation

  # ===== AI Orchestrator — 内网服务，不对外暴露端口 =====
  ai-orchestrator:
    build:
      context: ./ai_orchestrator
      dockerfile: Dockerfile
    env_file: .env
    environment:
      - ORCHESTRATOR_DB_USER=ainerwise_orchestrator
      - ORCHESTRATOR_DB_PASSWORD=${ORCHESTRATOR_DB_PASSWORD:-ainerwise_orchestrator_dev}
    volumes:
      - ./ai_orchestrator:/app
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload

  # ===== Channel Gateway — 渠道统一收发，仅 Docker 内网 =====
  channel-gateway:
    build:
      context: ./channel_gateway
      dockerfile: Dockerfile
    env_file: .env
    environment:
      - BACKEND_INTERNAL_URL=http://backend:8000/internal/v1
    volumes:
      - ./channel_gateway:/app
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started
    command: uvicorn app.main:app --host 0.0.0.0 --port 8200 --reload

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    environment:
      - PYTHONPATH=/app
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app beat --loglevel=info

  # ===== PC端 — 公开官网 (port 4099) =====
  frontend-pc:
    build:
      context: ./frontend-pc
      dockerfile: Dockerfile
    env_file: .env
    environment:
      - NUXT_PUBLIC_PORTAL_MODE=aislos
      - NUXT_PUBLIC_AISLOS_URL=http://localhost:4099
      - NUXT_PUBLIC_STORE_URL=http://localhost:4096
      - NUXT_PUBLIC_DEVELOPER_URL=http://localhost:4092
      - NUXT_PUBLIC_CUSTOMER_URL=http://localhost:4098
      - NUXT_PUBLIC_ADMIN_URL=http://localhost:4097
      - NUXT_PUBLIC_STORE_ADMIN_URL=http://localhost:4095
      - NUXT_PUBLIC_AGENT_URL=http://localhost:4093
    ports:
      - "4099:4099"
    volumes:
      - ./frontend-pc:/app
      - /app/node_modules
      - /app/.nuxt
    depends_on:
      - backend
    command: npx nuxi dev --host 0.0.0.0 --port 4099

  # ===== Ainerwise Store Frontend — 独立产品/需求单入口 (port 4096) =====
  store-frontend:
    build:
      context: ./frontend-pc
      dockerfile: Dockerfile
    env_file: .env
