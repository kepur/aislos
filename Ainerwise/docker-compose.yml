  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend-pc
      - frontend-h5
      - frontend-admin
      - store-frontend
      - store-admin
      - marketing-portal
      - agent-console
      - developer-portal
      - partner-portal
      - kiosk-portal
      - backend
      - channel-gateway

volumes:
  pg_data:
  redis_data:
  minio_data:
