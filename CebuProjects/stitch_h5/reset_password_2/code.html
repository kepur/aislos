        .material-symbols-outlined {
          font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-surface text-on-surface antialiased min-h-screen flex flex-col selection:bg-primary-container selection:text-on-primary-container">
<!-- Header / Back Navigation -->
<header class="flex items-center px-md h-16 shrink-0">
<button aria-label="Return to login" class="flex items-center text-on-surface hover:text-primary transition-colors active:opacity-70">
<span class="material-symbols-outlined mr-sm" style="font-variation-settings: 'FILL' 0, 'wght' 300;">arrow_back_ios</span>
<span class="font-label-md text-label-md">Back</span>
</button>
</header>
<!-- Main Content -->
<main class="flex-1 flex flex-col px-md pt-lg pb-xl max-w-md mx-auto w-full">
<!-- Icon & Header Section -->
<div class="flex flex-col items-start mb-xl">
<div class="h-12 w-12 rounded-xl bg-surface-container-highest flex items-center justify-center mb-md shadow-sm">
<span class="material-symbols-outlined text-primary text-[28px]" style="font-variation-settings: 'FILL' 1;">lock_reset</span>
</div>
<h1 class="font-h1 text-h1 text-on-background mb-sm">Reset Password</h1>
<p class="font-body-md text-body-md text-on-surface-variant max-w-[90%]">
                Please enter the email or phone number associated with your account. We will send you instructions to safely reset your password.
            </p>
</div>
<!-- Form Section -->
<form action="#" class="flex-1 flex flex-col" method="POST">
<div class="space-y-md flex-1">
<!-- Input Field Group -->
<div class="flex flex-col space-y-xs">
<label class="font-label-sm text-label-sm text-on-surface ml-1" for="recovery-contact">Email or Phone</label>
<div class="relative">
<input class="h-[52px] w-full bg-surface-container-lowest border border-outline-variant rounded-lg px-4 font-body-lg text-body-lg text-on-surface placeholder:text-outline focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-shadow shadow-sm" id="recovery-contact" name="contact" placeholder="Enter your email or phone" required="" type="text"/>
</div>
</div>
</div>
<!-- Action Area (Sticky to bottom on mobile, visually grounded) -->
<div class="mt-xl pb-safe pt-md">
<button class="h-[56px] w-full bg-primary text-on-primary rounded-full font-label-md text-label-md flex items-center justify-center shadow-[0_4px_12px_rgba(36,56,156,0.2)] hover:bg-on-primary-fixed-variant active:scale-[0.98] transition-all" type="submit">
                    Reset Password
                </button>
<div class="mt-lg text-center">
<span class="font-body-md text-body-md text-on-surface-variant">Remembered your password?</span>
<a class="font-label-md text-label-md text-primary ml-1 hover:underline active:opacity-70" href="#">
                        Log in
                    </a>
</div>
</div>
</form>
</main>
</body></html>
