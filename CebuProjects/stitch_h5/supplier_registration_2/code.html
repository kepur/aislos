<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" name="viewport"/>
<title>Supplier Registration - {{APP_NAME}}</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary-fixed-variant": "#293ca0",
                        "error-container": "#ffdad6",
                        "inverse-surface": "#213145",
                        "surface-tint": "#4355b9",
                        "primary-fixed-dim": "#bac3ff",
                        "on-primary-fixed": "#00105c",
                        "primary-fixed": "#dee0ff",
                        "on-tertiary-fixed": "#301400",
                        "surface-dim": "#cbdbf5",
                        "surface-container-high": "#dce9ff",
                        "on-surface": "#0b1c30",
                        "inverse-primary": "#bac3ff",
                        "background": "#f8f9ff",
                        "surface-bright": "#f8f9ff",
                        "outline-variant": "#c5c5d4",
                        "on-tertiary-fixed-variant": "#713700",
                        "on-secondary-fixed-variant": "#354282",
                        "on-secondary-fixed": "#021355",
                        "outline": "#757684",
                        "secondary-fixed": "#dee1ff",
                        "on-error-container": "#93000a",
                        "surface-container-lowest": "#ffffff",
                        "inverse-on-surface": "#eaf1ff",
                        "tertiary": "#6c3400",
                        "error": "#ba1a1a",
                        "tertiary-fixed": "#ffdcc6",
                        "surface-variant": "#d3e4fe",
                        "secondary": "#4d5a9c",
                        "on-secondary": "#ffffff",
                        "on-primary": "#ffffff",
                        "tertiary-fixed-dim": "#ffb784",
                        "on-tertiary-container": "#ffc7a2",
                        "on-secondary-container": "#394687",
                        "on-primary-container": "#cacfff",
                        "surface-container-low": "#eff4ff",
                        "tertiary-container": "#8f4700",
                        "secondary-container": "#abb7ff",
                        "primary-container": "#3f51b5",
                        "on-tertiary": "#ffffff",
                        "surface": "#f8f9ff",
                        "on-background": "#0b1c30",
                        "surface-container-highest": "#d3e4fe",
                        "primary": "#24389c",
                        "on-error": "#ffffff",
                        "surface-container": "#e5eeff",
                        "secondary-fixed-dim": "#b9c3ff",
                        "on-surface-variant": "#454652"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "sm": "8px",
                        "md": "16px",
                        "gutter-mobile": "12px",
                        "xs": "4px",
                        "margin-mobile": "16px",
                        "lg": "24px",
                        "xl": "32px",
                        "base": "4px"
                    },
                    "fontFamily": {
                        "h1": ["Inter"],
                        "label-md": ["Inter"],
                        "h3": ["Inter"],
                        "body-md": ["Inter"],
                        "body-lg": ["Inter"],

                        "h2": ["Inter"]
                    },
                    "fontSize": {
                        "h1": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "label-md": ["14px", { "lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "600" }],
                        "h3": ["18px", { "lineHeight": "24px", "letterSpacing": "0", "fontWeight": "600" }],
                        "body-md": ["14px", { "lineHeight": "20px", "letterSpacing": "0", "fontWeight": "400" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "letterSpacing": "0", "fontWeight": "400" }],
                        "label-sm": ["12px", { "lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "500" }],
                        "h2": ["20px", { "lineHeight": "28px", "letterSpacing": "-0.01em", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style>
        body { -webkit-tap-highlight-color: transparent; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 24px); }
        .pt-safe { padding-top: env(safe-area-inset-top, 0px); }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md antialiased min-h-screen flex flex-col">
<!-- TopAppBar (Suppressed as this is a transactional flow, but keeping a simple back header for context) -->
<header class="fixed top-0 w-full z-50 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200/60 dark:border-slate-800/60 shadow-sm flex items-center justify-between px-4 h-16 w-full pt-safe">
<button class="text-indigo-600 dark:text-indigo-400 p-2 -ml-2 rounded-full hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors active:scale-95 duration-150">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-h2 text-h2 text-slate-900 dark:text-white font-bold tracking-tight">Supplier Registration</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<!-- Main Content Canvas -->
<main class="flex-1 pt-[calc(64px+env(safe-area-inset-top))] pb-[calc(88px+env(safe-area-inset-bottom))] px-margin-mobile">
<!-- Progress Stepper -->
<div class="py-lg flex items-center justify-center space-x-4">
<div class="flex flex-col items-center">
<div class="w-8 h-8 rounded-full bg-primary text-on-primary flex items-center justify-center font-label-md text-label-md shadow-sm">1</div>
<span class="font-label-sm text-label-sm text-primary mt-xs">Details</span>
</div>
<div class="h-[2px] w-12 bg-surface-variant rounded-full"></div>
<div class="flex flex-col items-center">
<div class="w-8 h-8 rounded-full bg-surface-container-high text-on-surface-variant flex items-center justify-center font-label-md text-label-md">2</div>
<span class="font-label-sm text-label-sm text-on-surface-variant mt-xs">Verify</span>
</div>
<div class="h-[2px] w-12 bg-surface-variant rounded-full"></div>
<div class="flex flex-col items-center">
<div class="w-8 h-8 rounded-full bg-surface-container-high text-on-surface-variant flex items-center justify-center font-label-md text-label-md">3</div>
<span class="font-label-sm text-label-sm text-on-surface-variant mt-xs">Done</span>
</div>
</div>
<form class="space-y-lg">
<!-- Company Info Section -->
<section class="bg-surface-container-lowest rounded-xl p-md shadow-[0_4px_12px_rgba(0,0,0,0.05)] border border-surface-variant">
<h2 class="font-h3 text-h3 text-on-surface mb-md flex items-center">
<span class="material-symbols-outlined mr-sm text-primary" data-icon="domain">domain</span>
                    Company Information
                </h2>
<div class="space-y-md">
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-xs">Legal Company Name *</label>
<input class="w-full h-[52px] px-md rounded-lg border border-outline-variant bg-surface-container-lowest text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-shadow placeholder:text-outline" placeholder="e.g. Acme Corporation" type="text"/>
</div>
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-xs">Business Type *</label>
<div class="relative">
<select class="w-full h-[52px] px-md rounded-lg border border-outline-variant bg-surface-container-lowest text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-shadow appearance-none">
<option disabled="" selected="" value="">Select business type</option>
<option value="manufacturer">Manufacturer</option>
<option value="distributor">Distributor</option>
<option value="wholesaler">Wholesaler</option>
<option value="service_provider">Service Provider</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-outline-variant pointer-events-none" data-icon="expand_more">expand_more</span>
</div>
</div>
</div>
</section>
<!-- Contact Info Section -->
<section class="bg-surface-container-lowest rounded-xl p-md shadow-[0_4px_12px_rgba(0,0,0,0.05)] border border-surface-variant">
<h2 class="font-h3 text-h3 text-on-surface mb-md flex items-center">
<span class="material-symbols-outlined mr-sm text-primary" data-icon="person">person</span>
                    Contact Details
                </h2>
<div class="space-y-md">
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-xs">Contact Person *</label>
<input class="w-full h-[52px] px-md rounded-lg border border-outline-variant bg-surface-container-lowest text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-shadow placeholder:text-outline" placeholder="Full Name" type="text"/>
</div>
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-xs">Work Email *</label>
<input class="w-full h-[52px] px-md rounded-lg border border-outline-variant bg-surface-container-lowest text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-shadow placeholder:text-outline" placeholder="name@company.com" type="email"/>
</div>
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-xs">Phone Number *</label>
<div class="flex gap-sm">
<div class="relative w-1/3">
<select class="w-full h-[52px] px-md rounded-lg border border-outline-variant bg-surface-container-lowest text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-shadow appearance-none">
<option value="+1">US (+1)</option>
<option value="+44">UK (+44)</option>
<option value="+91">IN (+91)</option>
</select>
<span class="material-symbols-outlined absolute right-2 top-1/2 -translate-y-1/2 text-outline-variant pointer-events-none text-sm" data-icon="expand_more">expand_more</span>
</div>
<input class="w-2/3 h-[52px] px-md rounded-lg border border-outline-variant bg-surface-container-lowest text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-shadow placeholder:text-outline" placeholder="(555) 000-0000" type="tel"/>
</div>
</div>
</div>
</section>
<!-- Location Section -->
<section class="bg-surface-container-lowest rounded-xl p-md shadow-[0_4px_12px_rgba(0,0,0,0.05)] border border-surface-variant">
<h2 class="font-h3 text-h3 text-on-surface mb-md flex items-center">
<span class="material-symbols-outlined mr-sm text-primary" data-icon="location_on">location_on</span>
                    Headquarters
                </h2>
<div class="space-y-md">
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-xs">Country *</label>
<div class="relative">
<select class="w-full h-[52px] px-md rounded-lg border border-outline-variant bg-surface-container-lowest text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-shadow appearance-none">
<option disabled="" selected="" value="">Select country</option>
<option value="us">United States</option>
<option value="ca">Canada</option>
<option value="uk">United Kingdom</option>
<option value="au">Australia</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-outline-variant pointer-events-none" data-icon="expand_more">expand_more</span>
</div>
</div>
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-xs">City / Region *</label>
<input class="w-full h-[52px] px-md rounded-lg border border-outline-variant bg-surface-container-lowest text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-shadow placeholder:text-outline" placeholder="City or State" type="text"/>
</div>
</div>
</section>
<!-- Categories Section (Bento style grid) -->
<section class="bg-surface-container-lowest rounded-xl p-md shadow-[0_4px_12px_rgba(0,0,0,0.05)] border border-surface-variant">
<h2 class="font-h3 text-h3 text-on-surface mb-md flex items-center">
<span class="material-symbols-outlined mr-sm text-primary" data-icon="category">category</span>
                    Main Categories
                </h2>
<p class="font-body-md text-body-md text-on-surface-variant mb-md">Select up to 3 primary categories you supply.</p>
<div class="grid grid-cols-2 gap-sm">
<label class="flex items-center p-sm border border-outline-variant rounded-lg cursor-pointer hover:bg-surface-container-low transition-colors has-[:checked]:border-primary has-[:checked]:bg-primary-container/10">
<input class="w-4 h-4 text-primary rounded border-outline focus:ring-primary mr-sm" name="category" type="checkbox" value="electronics"/>
<span class="font-label-md text-label-md text-on-surface">Electronics</span>
</label>
<label class="flex items-center p-sm border border-outline-variant rounded-lg cursor-pointer hover:bg-surface-container-low transition-colors has-[:checked]:border-primary has-[:checked]:bg-primary-container/10">
<input class="w-4 h-4 text-primary rounded border-outline focus:ring-primary mr-sm" name="category" type="checkbox" value="construction"/>
<span class="font-label-md text-label-md text-on-surface">Construction</span>
</label>
<label class="flex items-center p-sm border border-outline-variant rounded-lg cursor-pointer hover:bg-surface-container-low transition-colors has-[:checked]:border-primary has-[:checked]:bg-primary-container/10">
<input class="w-4 h-4 text-primary rounded border-outline focus:ring-primary mr-sm" name="category" type="checkbox" value="apparel"/>
<span class="font-label-md text-label-md text-on-surface">Apparel</span>
</label>
<label class="flex items-center p-sm border border-outline-variant rounded-lg cursor-pointer hover:bg-surface-container-low transition-colors has-[:checked]:border-primary has-[:checked]:bg-primary-container/10">
<input class="w-4 h-4 text-primary rounded border-outline focus:ring-primary mr-sm" name="category" type="checkbox" value="industrial"/>
<span class="font-label-md text-label-md text-on-surface">Industrial</span>
</label>
</div>
</section>
</form>
</main>
<!-- Sticky Bottom Action Area -->
<div class="fixed bottom-0 left-0 w-full bg-white/90 dark:bg-slate-950/90 backdrop-blur-xl border-t border-slate-100 dark:border-slate-800 shadow-[0_-4px_20px_rgba(0,0,0,0.05)] px-margin-mobile py-sm pb-safe z-50">
<button class="w-full h-[56px] bg-primary text-on-primary font-label-md text-label-md rounded-xl flex items-center justify-center shadow-sm active:scale-[0.98] active:brightness-95 transition-all">
            Continue to Verification
            <span class="material-symbols-outlined ml-xs" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</body></html>
