<body class="bg-background text-on-background min-h-screen flex flex-col antialiased">
<!-- Top App Bar -->
<header class="fixed top-0 w-full z-50 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200/60 dark:border-slate-800/60 shadow-sm flex items-center justify-between px-4 h-16 w-full">
<button class="text-indigo-600 dark:text-indigo-400 text-slate-500 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors active:scale-95 duration-150 p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
</button>
<h1 class="font-['Inter'] antialiased text-xl font-bold tracking-tight text-slate-900 dark:text-white">Make Offer</h1>
<button class="text-indigo-600 dark:text-indigo-400 text-slate-500 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors active:scale-95 duration-150 p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">more_vert</span>
</button>
</header>
<!-- Main Content Area -->
<main class="flex-grow pt-20 pb-32 px-margin-mobile flex flex-col gap-sm">
<!-- Request Summary Card -->
<div class="bg-surface-container-lowest rounded-xl shadow-[0_4px_12px_rgba(0,0,0,0.05)] p-md flex flex-col gap-sm">
<div class="flex justify-between items-start">
<div>
<span class="font-label-sm text-label-sm text-primary uppercase tracking-wider">Request #REQ-8924</span>
<h2 class="font-h3 text-h3 text-on-surface mt-1">Portland Cement Type I/II</h2>
</div>
<div class="bg-surface-container-highest px-2 py-1 rounded flex items-center gap-1">
<span class="material-symbols-outlined text-[16px] text-primary" style="font-variation-settings: 'FILL' 1;">timer</span>
<span class="font-label-sm text-label-sm text-primary">24h left</span>
</div>
</div>
<div class="grid grid-cols-2 gap-md mt-2">
<div>
<span class="font-label-sm text-label-sm text-outline block mb-1">Quantity Requested</span>
<span class="font-body-md text-body-md text-on-surface font-semibold">500 Pallets</span>
</div>
<div>
<span class="font-label-sm text-label-sm text-outline block mb-1">Delivery Location</span>
<span class="font-body-md text-body-md text-on-surface font-semibold">Austin, TX</span>
</div>
</div>
</div>
<!-- Pricing Form Section -->
<div class="bg-surface-container-lowest rounded-xl shadow-[0_4px_12px_rgba(0,0,0,0.05)] p-md flex flex-col gap-md mt-sm">
<h3 class="font-h3 text-h3 text-on-surface border-b border-surface-container pb-2">Pricing Details</h3>
<div class="flex flex-col gap-1">
<label class="font-label-md text-label-md text-on-surface" for="unit-price">Unit Price ($ / Pallet)</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="text-outline font-body-md text-body-md">$</span>
</div>
<input class="h-[52px] w-full pl-8 pr-3 py-2 border border-outline-variant rounded-lg focus:ring-primary focus:border-primary font-body-md text-body-md bg-surface-container-lowest text-on-surface transition-colors" id="unit-price" placeholder="0.00" type="number" value="125.00"/>
</div>
</div>
<div class="flex flex-col gap-1">
<label class="font-label-md text-label-md text-on-surface" for="delivery-fee">Delivery Fee (Total)</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="text-outline font-body-md text-body-md">$</span>
</div>
<input class="h-[52px] w-full pl-8 pr-3 py-2 border border-outline-variant rounded-lg focus:ring-primary focus:border-primary font-body-md text-body-md bg-surface-container-lowest text-on-surface transition-colors" id="delivery-fee" placeholder="0.00" type="number" value="450.00"/>
</div>
</div>
</div>
<!-- Logistics Form Section -->
<div class="bg-surface-container-lowest rounded-xl shadow-[0_4px_12px_rgba(0,0,0,0.05)] p-md flex flex-col gap-md mt-sm">
<h3 class="font-h3 text-h3 text-on-surface border-b border-surface-container pb-2">Logistics &amp; Terms</h3>
<div class="flex flex-col gap-1">
<label class="font-label-md text-label-md text-on-surface" for="eta">Estimated Time of Arrival (ETA)</label>
<select class="h-[52px] w-full px-3 py-2 border border-outline-variant rounded-lg focus:ring-primary focus:border-primary font-body-md text-body-md bg-surface-container-lowest text-on-surface transition-colors appearance-none" id="eta">
<option>1-2 Days</option>
<option selected="">3-5 Days</option>
<option>1 Week</option>
<option>2+ Weeks</option>
</select>
</div>
<div class="flex flex-col gap-1">
<label class="font-label-md text-label-md text-on-surface" for="stock">Stock Confidence</label>
<select class="h-[52px] w-full px-3 py-2 border border-outline-variant rounded-lg focus:ring-primary focus:border-primary font-body-md text-body-md bg-surface-container-lowest text-on-surface transition-colors appearance-none" id="stock">
<option selected="">High (Guaranteed)</option>
<option>Medium (Likely)</option>
<option>Low (Pending Verification)</option>
</select>
</div>
<div class="flex flex-col gap-1">
<label class="font-label-md text-label-md text-on-surface" for="expiry">Offer Expiry</label>
<input class="h-[52px] w-full px-3 py-2 border border-outline-variant rounded-lg focus:ring-primary focus:border-primary font-body-md text-body-md bg-surface-container-lowest text-on-surface transition-colors" id="expiry" type="date" value="2023-11-01"/>
</div>
</div>
<!-- Trust Indicator -->
<div class="flex items-center justify-center gap-2 mt-4 opacity-80">
<span class="material-symbols-outlined text-[18px] text-primary" style="font-variation-settings: 'FILL' 1;">shield</span>
<span class="font-label-sm text-label-sm text-on-surface-variant">Escrow Protected Transaction</span>
</div>
</main>
<!-- Sticky Bottom Action Area -->
<div class="fixed bottom-0 left-0 w-full bg-white/95 backdrop-blur-md shadow-[0_-4px_20px_rgba(0,0,0,0.08)] px-margin-mobile pt-sm pb-lg z-40 border-t border-surface-container flex flex-col gap-sm">
<div class="flex justify-between items-end mb-2">
<span class="font-body-md text-body-md text-outline">Total Landed Cost</span>
<span class="font-h2 text-h2 text-on-surface font-bold">$62,950.00</span>
</div>
<button class="h-[56px] w-full bg-primary text-on-primary rounded-xl font-label-md text-label-md flex items-center justify-center shadow-sm active:scale-[0.98] transition-transform">
            Submit Offer
        </button>
</div>
</body></html>
