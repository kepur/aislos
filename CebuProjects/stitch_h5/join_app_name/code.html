<body class="bg-background min-h-screen flex flex-col font-body-md text-on-background selection:bg-primary-container selection:text-on-primary-container">
<!-- Main Content Area -->
<main class="flex-grow flex items-center justify-center p-margin-mobile">
<div class="max-w-2xl w-full">
<!-- Header Section -->
<div class="text-center mb-xl">
<h1 class="font-h1 text-h1 text-on-surface mb-xs">Choose Your Role</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">Select how you want to use the platform to get started.</p>
</div>
<!-- Role Selection Cards -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-margin-mobile md:gap-lg mb-xl">
<!-- Buyer Card -->
<button class="group flex flex-col items-center text-center p-lg bg-surface-container-lowest rounded-xl shadow-[0_4px_12px_rgba(0,0,0,0.05)] border border-outline-variant hover:border-primary transition-all duration-200 active:scale-95 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2">
<div class="w-16 h-16 rounded-full bg-surface-container flex items-center justify-center mb-md group-hover:bg-primary group-hover:text-on-primary transition-colors duration-200 text-primary">
<span class="material-symbols-outlined" style="font-size: 32px; font-variation-settings: 'FILL' 1;">shopping_bag</span>
</div>
<h2 class="font-h2 text-h2 text-on-surface mb-sm">I am a Buyer</h2>
<p class="font-body-md text-body-md text-on-surface-variant mb-lg flex-grow">Post requests, find verified suppliers, and pay safely through escrow.</p>
<div class="w-full bg-surface-container text-on-surface font-label-md text-label-md py-3 rounded-lg group-hover:bg-primary group-hover:text-on-primary transition-colors duration-200">
                        Select
                    </div>
</button>
<!-- Supplier Card -->
<button class="group flex flex-col items-center text-center p-lg bg-surface-container-lowest rounded-xl shadow-[0_4px_12px_rgba(0,0,0,0.05)] border border-outline-variant hover:border-primary transition-all duration-200 active:scale-95 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2">
<div class="w-16 h-16 rounded-full bg-surface-container flex items-center justify-center mb-md group-hover:bg-primary group-hover:text-on-primary transition-colors duration-200 text-primary">
<span class="material-symbols-outlined" style="font-size: 32px; font-variation-settings: 'FILL' 1;">local_shipping</span>
</div>
<h2 class="font-h2 text-h2 text-on-surface mb-sm">I am a Supplier</h2>
<p class="font-body-md text-body-md text-on-surface-variant mb-lg flex-grow">Get pings for new requests, submit competitive bids, and secure payouts.</p>
<div class="w-full bg-surface-container text-on-surface font-label-md text-label-md py-3 rounded-lg group-hover:bg-primary group-hover:text-on-primary transition-colors duration-200">
                        Select
                    </div>
</button>
</div>
<!-- Footer Action -->
<div class="text-center">
<a class="inline-flex items-center justify-center font-label-md text-label-md text-primary hover:text-on-primary-fixed transition-colors duration-200 p-sm" href="#">
<span class="material-symbols-outlined mr-xs" style="font-size: 20px;">arrow_back</span>
                    Back to Login
                </a>
</div>
