<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" name="viewport"/>
<title>Payment Method</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-bright": "#f8f9ff",
                        "on-secondary-container": "#394687",
                        "error": "#ba1a1a",
                        "tertiary-fixed": "#ffdcc6",
                        "on-tertiary": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "on-error": "#ffffff",
                        "inverse-on-surface": "#eaf1ff",
                        "surface-tint": "#4355b9",
                        "primary-container": "#3f51b5",
                        "secondary-fixed-dim": "#b9c3ff",
                        "on-secondary-fixed-variant": "#354282",
                        "on-primary-fixed-variant": "#293ca0",
                        "on-primary-fixed": "#00105c",
                        "tertiary-fixed-dim": "#ffb784",
                        "surface": "#f8f9ff",
                        "surface-container": "#e5eeff",
                        "on-tertiary-fixed-variant": "#713700",
                        "on-tertiary-container": "#ffc7a2",
                        "secondary-fixed": "#dee1ff",
                        "on-secondary": "#ffffff",
                        "secondary-container": "#abb7ff",
                        "on-primary-container": "#cacfff",
                        "on-surface": "#0b1c30",
                        "surface-container-highest": "#d3e4fe",
                        "on-surface-variant": "#454652",
                        "secondary": "#4d5a9c",
                        "inverse-surface": "#213145",
                        "inverse-primary": "#bac3ff",
                        "outline-variant": "#c5c5d4",
                        "tertiary-container": "#8f4700",
                        "on-background": "#0b1c30",
                        "on-primary": "#ffffff",
                        "surface-dim": "#cbdbf5",
                        "tertiary": "#6c3400",
                        "primary": "#24389c",
                        "surface-variant": "#d3e4fe",
                        "background": "#f8f9ff",
                        "surface-container-high": "#dce9ff",
                        "on-secondary-fixed": "#021355",
                        "surface-container-low": "#eff4ff",
                        "primary-fixed": "#dee0ff",
                        "outline": "#757684",
                        "on-error-container": "#93000a",
                        "primary-fixed-dim": "#bac3ff",
                        "on-tertiary-fixed": "#301400",
                        "error-container": "#ffdad6"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter-mobile": "12px",
                        "sm": "8px",
                        "lg": "24px",
                        "xs": "4px",
                        "xl": "32px",
                        "md": "16px",
                        "margin-mobile": "16px",
                        "base": "4px"
                    },
                    "fontFamily": {
                        "body-lg": ["Inter"],
                        "label-md": ["Inter"],
                        "h3": ["Inter"],
                        "label-sm": ["Inter"],
                        "h2": ["Inter"],
                        "body-md": ["Inter"],
                        "h1": ["Inter"]
                    },
                    "fontSize": {
                        "body-lg": ["16px", { "lineHeight": "24px", "letterSpacing": "0", "fontWeight": "400" }],
                        "label-md": ["14px", { "lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "600" }],
                        "h3": ["18px", { "lineHeight": "24px", "letterSpacing": "0", "fontWeight": "600" }],
                        "label-sm": ["12px", { "lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "500" }],
                        "h2": ["20px", { "lineHeight": "28px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "body-md": ["14px", { "lineHeight": "20px", "letterSpacing": "0", "fontWeight": "400" }],
                        "h1": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "700" }]
                    }
                }
            }
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body-md text-on-surface antialiased pb-32">
<!-- Top Navigation (Contextual departure from main nav, so custom back button header) -->
<header class="fixed top-0 w-full z-50 bg-surface-container-lowest/90 backdrop-blur-md border-b border-outline-variant/30 h-16 flex items-center px-margin-mobile shadow-[0_4px_12px_rgba(0,0,0,0.02)]">
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-surface-container-low transition-colors text-on-surface mr-sm active:scale-95 duration-150">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-h2 text-h2 text-on-surface flex-1 text-center pr-10">Select Payment Method</h1>
</header>
<main class="pt-24 px-margin-mobile max-w-lg mx-auto">
<!-- Summary Card -->
<div class="bg-surface-container-lowest rounded-xl p-md mb-lg shadow-[0_4px_12px_rgba(0,0,0,0.05)] border border-outline-variant/20 flex justify-between items-center">
<div>
<p class="font-label-sm text-label-sm text-on-surface-variant mb-xs">Total Amount</p>
<p class="font-h1 text-h1 text-primary">$1,250.00</p>
</div>
<div class="bg-surface-container-low rounded-lg p-sm flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-[18px]" data-icon="lock">lock</span>
<span class="font-label-sm text-label-sm text-primary">Secure checkout</span>
</div>
</div>
<h2 class="font-h3 text-h3 text-on-surface mb-md">Payment Options</h2>
<!-- Payment Methods List -->
<div class="space-y-sm">
<!-- Credit Card (Selected State) -->
<label class="relative block bg-surface-container-lowest rounded-xl p-md shadow-[0_4px_12px_rgba(0,0,0,0.05)] border-2 border-primary cursor-pointer active:scale-[0.98] transition-transform">
<div class="flex items-center gap-md">
<!-- Custom Radio -->
<div class="flex items-center justify-center w-5 h-5 rounded-full border-2 border-primary bg-surface-container-lowest">
<div class="w-2.5 h-2.5 rounded-full bg-primary"></div>
</div>
<div class="flex-1">
<div class="flex items-center justify-between mb-xs">
<span class="font-label-md text-label-md text-on-surface">Visa / Mastercard</span>
<div class="flex gap-1">
<!-- Placeholder for card logos -->
<div class="w-8 h-5 bg-surface-container rounded flex items-center justify-center">
<span class="material-symbols-outlined text-[14px] text-primary" data-icon="credit_card">credit_card</span>
</div>
</div>
</div>
<p class="font-body-md text-body-md text-on-surface-variant">Instant processing. 2.9% fee.</p>
</div>
</div>
<!-- Selected State Indicator (Subtle background) -->
<div class="absolute inset-0 bg-primary/5 rounded-xl pointer-events-none"></div>
</label>
<!-- Stripe -->
<label class="relative block bg-surface-container-lowest rounded-xl p-md shadow-[0_4px_12px_rgba(0,0,0,0.05)] border border-outline-variant/30 cursor-pointer hover:border-outline-variant active:scale-[0.98] transition-all">
<div class="flex items-center gap-md">
<!-- Unselected Radio -->
<div class="w-5 h-5 rounded-full border-2 border-outline-variant bg-surface-container-lowest"></div>
<div class="flex-1">
<div class="flex items-center justify-between mb-xs">
<span class="font-label-md text-label-md text-on-surface">Stripe Checkout</span>
<span class="material-symbols-outlined text-outline" data-icon="payments">payments</span>
</div>
<p class="font-body-md text-body-md text-on-surface-variant">Apple Pay, Google Pay supported.</p>
</div>
</div>
</label>
<!-- Crypto (USDT) -->
<label class="relative block bg-surface-container-lowest rounded-xl p-md shadow-[0_4px_12px_rgba(0,0,0,0.05)] border border-outline-variant/30 cursor-pointer hover:border-outline-variant active:scale-[0.98] transition-all">
<div class="flex items-center gap-md">
<div class="w-5 h-5 rounded-full border-2 border-outline-variant bg-surface-container-lowest"></div>
<div class="flex-1">
<div class="flex items-center justify-between mb-xs">
<span class="font-label-md text-label-md text-on-surface">USDT (ERC-20/TRC-20)</span>
<span class="material-symbols-outlined text-outline" data-icon="currency_bitcoin">currency_bitcoin</span>
</div>
<p class="font-body-md text-body-md text-on-surface-variant">Zero marketplace fees.</p>
</div>
</div>
</label>
<!-- Bank Transfer -->
<label class="relative block bg-surface-container-lowest rounded-xl p-md shadow-[0_4px_12px_rgba(0,0,0,0.05)] border border-outline-variant/30 cursor-pointer hover:border-outline-variant active:scale-[0.98] transition-all">
<div class="flex items-center gap-md">
<div class="w-5 h-5 rounded-full border-2 border-outline-variant bg-surface-container-lowest"></div>
<div class="flex-1">
<div class="flex items-center justify-between mb-xs">
<span class="font-label-md text-label-md text-on-surface">Manual Bank Transfer</span>
<span class="material-symbols-outlined text-outline" data-icon="account_balance">account_balance</span>
</div>
<p class="font-body-md text-body-md text-on-surface-variant">Takes 1-3 business days.</p>
</div>
</div>
</label>
<!-- Wallet Balance (Disabled/Future Phase) -->
<div class="relative block bg-surface-container-lowest/50 rounded-xl p-md border border-outline-variant/20 opacity-60">
<div class="flex items-center gap-md">
<div class="w-5 h-5 rounded-full border-2 border-outline-variant/30 bg-surface-container-lowest/50"></div>
<div class="flex-1">
<div class="flex items-center justify-between mb-xs">
<span class="font-label-md text-label-md text-on-surface-variant">Wallet Balance</span>
<span class="font-label-sm text-label-sm bg-surface-container px-2 py-0.5 rounded text-on-surface-variant">Coming Soon</span>
</div>
<p class="font-body-md text-body-md text-on-surface-variant">Current balance: $0.00</p>
</div>
</div>
</div>
</div>
</main>
<!-- Sticky Bottom Action -->
<div class="fixed bottom-0 w-full z-50 bg-surface-container-lowest/95 backdrop-blur-xl border-t border-outline-variant/20 px-margin-mobile pb-safe pt-md shadow-[0_-4px_20px_rgba(0,0,0,0.08)]">
<div class="max-w-lg mx-auto pb-lg">
<button class="w-full h-[56px] bg-primary text-on-primary font-label-md text-label-md rounded-xl flex items-center justify-center gap-2 active:bg-primary/90 transition-colors shadow-[0_4px_12px_rgba(36,56,156,0.3)]">
<span class="material-symbols-outlined" data-icon="check_circle">check_circle</span>
                Confirm Method
            </button>
</div>
</div>
</body></html>
