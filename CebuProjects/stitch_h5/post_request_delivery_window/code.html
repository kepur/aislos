<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
<title>Delivery Window</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "primary-fixed": "#dee0ff",
                    "primary-container": "#3f51b5",
                    "surface-container-high": "#dce9ff",
                    "on-error": "#ffffff",
                    "inverse-surface": "#213145",
                    "inverse-on-surface": "#eaf1ff",
                    "error": "#ba1a1a",
                    "surface-variant": "#d3e4fe",
                    "error-container": "#ffdad6",
                    "secondary-fixed-dim": "#b9c3ff",
                    "secondary-fixed": "#dee1ff",
                    "on-surface-variant": "#454652",
                    "on-surface": "#0b1c30",
                    "on-primary": "#ffffff",
                    "tertiary-container": "#8f4700",
                    "background": "#f8f9ff",
                    "tertiary-fixed-dim": "#ffb784",
                    "primary-fixed-dim": "#bac3ff",
                    "outline-variant": "#c5c5d4",
                    "surface-container-low": "#eff4ff",
                    "on-tertiary-fixed": "#301400",
                    "inverse-primary": "#bac3ff",
                    "on-tertiary-fixed-variant": "#713700",
                    "surface-bright": "#f8f9ff",
                    "on-tertiary": "#ffffff",
                    "on-secondary-fixed": "#021355",
                    "surface-container": "#e5eeff",
                    "on-primary-container": "#cacfff",
                    "secondary-container": "#abb7ff",
                    "surface-container-highest": "#d3e4fe",
                    "on-primary-fixed-variant": "#293ca0",
                    "on-secondary-fixed-variant": "#354282",
                    "on-secondary-container": "#394687",
                    "on-error-container": "#93000a",
                    "secondary": "#4d5a9c",
                    "surface-container-lowest": "#ffffff",
                    "surface": "#f8f9ff",
                    "primary": "#24389c",
                    "on-background": "#0b1c30",
                    "tertiary-fixed": "#ffdcc6",
                    "on-tertiary-container": "#ffc7a2",
                    "outline": "#757684",
                    "surface-dim": "#cbdbf5",
                    "on-primary-fixed": "#00105c",
                    "tertiary": "#6c3400",
                    "on-secondary": "#ffffff",
                    "surface-tint": "#4355b9"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "xl": "32px",
                    "lg": "24px",
                    "gutter-mobile": "12px",
                    "md": "16px",
                    "sm": "8px",
                    "margin-mobile": "16px",
                    "xs": "4px",
                    "base": "4px"
            },
            "fontFamily": {
                    "body-lg": ["Inter"],
                    "label-md": ["Inter"],
                    "h2": ["Inter"],
                    "h1": ["Inter"],
                    "label-sm": ["Inter"],
                    "h3": ["Inter"],
                    "body-md": ["Inter"]
            },
            "fontSize": {
                    "body-lg": ["16px", {"lineHeight": "24px", "letterSpacing": "0", "fontWeight": "400"}],
                    "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "600"}],
                    "h2": ["20px", {"lineHeight": "28px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                    "h1": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "500"}],
                    "h3": ["18px", {"lineHeight": "24px", "letterSpacing": "0", "fontWeight": "600"}],
                    "body-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0", "fontWeight": "400"}]
            }
          }
        }
      }
    </script>
<style>
        body { -webkit-tap-highlight-color: transparent; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .material-symbols-outlined.filled { font-variation-settings: 'FILL' 1; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-lg antialiased">
<!-- Top App Bar (Task-focused: back button implies departure, but since it's a flow, keeping standard header structure) -->
<header class="fixed top-0 w-full z-50 bg-white/95 backdrop-blur-md border-b border-surface-container shadow-sm flex items-center justify-between px-4 h-14">
<button class="text-on-surface p-2 -ml-2 active:opacity-70 transition-opacity">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<div class="text-center flex-1">
<h1 class="font-h3 text-on-surface">Delivery Details</h1>
<p class="font-label-sm text-on-surface-variant">Step 4 of 5</p>
</div>
<button class="text-primary font-label-md p-2 -mr-2 active:opacity-70 transition-opacity">Cancel</button>
</header>
<!-- Main Content -->
<main class="pt-16 pb-24 px-margin-mobile flex flex-col gap-md max-w-screen-md mx-auto">
<!-- Progress Stepper -->
<div class="flex items-center justify-between px-2 pt-sm pb-md">
<div class="flex-1 h-1 bg-primary rounded-full"></div>
<div class="w-xs"></div>
<div class="flex-1 h-1 bg-primary rounded-full"></div>
<div class="w-xs"></div>
<div class="flex-1 h-1 bg-primary rounded-full"></div>
<div class="w-xs"></div>
<div class="flex-1 h-1 bg-primary rounded-full relative">
<div class="absolute -top-3 left-1/2 -translate-x-1/2 w-7 h-7 bg-primary text-on-primary rounded-full flex items-center justify-center font-label-sm">4</div>
</div>
<div class="w-xs"></div>
<div class="flex-1 h-1 bg-surface-container-highest rounded-full"></div>
</div>
<!-- Section: When -->
<section class="bg-surface-container-lowest rounded-xl shadow-[0_4px_12px_0px_rgba(0,0,0,0.05)] p-md flex flex-col gap-md border border-surface-container-low">
<h2 class="font-h3 text-on-surface flex items-center gap-2">
<span class="material-symbols-outlined text-primary">calendar_today</span>
                When do you need it?
            </h2>
<div class="flex flex-col gap-sm">
<label class="font-label-md text-on-surface-variant">Needed by date</label>
<div class="relative">
<input class="w-full h-[52px] px-4 border border-outline-variant rounded-lg bg-surface-container-lowest text-on-surface font-body-lg focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors" type="date" value="2023-11-15"/>
</div>
</div>
<div class="flex flex-col gap-sm">
<label class="font-label-md text-on-surface-variant">Time window</label>
<div class="grid grid-cols-2 gap-sm">
<button class="h-[52px] border border-outline-variant rounded-lg font-body-md text-on-surface flex items-center justify-center gap-2 active:bg-surface-container transition-colors">
<span class="material-symbols-outlined text-[20px]">light_mode</span> Morning
                    </button>
<button class="h-[52px] border-2 border-primary bg-primary/5 rounded-lg font-label-md text-primary flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[20px] filled">wb_sunny</span> Afternoon
                    </button>
<button class="h-[52px] border border-outline-variant rounded-lg font-body-md text-on-surface flex items-center justify-center gap-2 active:bg-surface-container transition-colors">
<span class="material-symbols-outlined text-[20px]">dark_mode</span> Evening
                    </button>
<button class="h-[52px] border border-outline-variant rounded-lg font-body-md text-on-surface flex items-center justify-center gap-2 active:bg-surface-container transition-colors">
<span class="material-symbols-outlined text-[20px]">all_inclusive</span> Any time
                    </button>
</div>
</div>
<div class="flex items-center justify-between pt-sm border-t border-surface-container-low mt-sm">
<div>
<p class="font-label-md text-on-surface">Flexible dates</p>
<p class="font-body-md text-on-surface-variant text-sm">+ / - 2 days</p>
</div>
<button class="w-12 h-6 rounded-full bg-primary relative transition-colors">
<div class="absolute right-1 top-1 w-4 h-4 bg-white rounded-full shadow-sm"></div>
</button>
</div>
</section>
<!-- Section: How -->
<section class="bg-surface-container-lowest rounded-xl shadow-[0_4px_12px_0px_rgba(0,0,0,0.05)] p-md flex flex-col gap-md border border-surface-container-low">
<h2 class="font-h3 text-on-surface flex items-center gap-2">
<span class="material-symbols-outlined text-primary">local_shipping</span>
                Delivery Method
            </h2>
<div class="flex flex-col gap-3">
<!-- Option 1 -->
<label class="flex items-start gap-3 p-3 border-2 border-primary bg-primary/5 rounded-lg cursor-pointer">
<div class="mt-0.5">
<span class="material-symbols-outlined text-primary filled">radio_button_checked</span>
</div>
<div class="flex-1">
<p class="font-label-md text-on-surface">Supplier Delivery</p>
<p class="font-body-md text-on-surface-variant text-sm mt-1">Delivered directly to your specified address.</p>
</div>
</label>
<!-- Option 2 -->
<label class="flex items-start gap-3 p-3 border border-outline-variant rounded-lg cursor-pointer active:bg-surface-container transition-colors">
<div class="mt-0.5">
<span class="material-symbols-outlined text-outline">radio_button_unchecked</span>
</div>
<div class="flex-1">
<p class="font-label-md text-on-surface">Local Pickup</p>
<p class="font-body-md text-on-surface-variant text-sm mt-1">You collect from the supplier's location.</p>
</div>
</label>
<!-- Option 3 -->
<label class="flex items-start gap-3 p-3 border border-outline-variant rounded-lg cursor-pointer active:bg-surface-container transition-colors">
<div class="mt-0.5">
<span class="material-symbols-outlined text-outline">radio_button_unchecked</span>
</div>
<div class="flex-1">
<p class="font-label-md text-on-surface">Meet-up</p>
<p class="font-body-md text-on-surface-variant text-sm mt-1">Meet at a secure, mutually agreed public location.</p>
</div>
</label>
</div>
</section>
<!-- Trust Indicator -->
<div class="flex items-center justify-center gap-2 py-sm">
<span class="material-symbols-outlined text-[18px] text-green-600">verified_user</span>
<span class="font-label-sm text-green-700">Escrow Protected Transaction</span>
</div>
</main>
<!-- Sticky Bottom Action -->
<div class="fixed bottom-0 w-full bg-white/95 backdrop-blur-lg border-t border-surface-container-low shadow-[0_-4px_20px_0px_rgba(0,0,0,0.08)] p-4 pb-[calc(1rem+env(safe-area-inset-bottom))] z-50">
<div class="max-w-screen-md mx-auto">
<button class="w-full h-[56px] bg-primary text-on-primary font-label-md rounded-lg shadow-sm active:bg-primary/90 transition-colors flex items-center justify-center gap-2">
                Continue to Review
                <span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</div>
</body></html>
