<body class="bg-background text-on-background antialiased min-h-screen flex flex-col relative selection:bg-primary-container selection:text-on-primary-container">
<!-- Transactional Header -->
<header class="flex items-center justify-between px-margin-mobile h-[64px] w-full shrink-0">
<button aria-label="Go back" class="flex items-center justify-center w-11 h-11 -ml-3 rounded-full hover:bg-surface-variant/50 active:bg-surface-variant transition-colors" type="button">
<span class="material-symbols-outlined text-[24px] text-on-surface">arrow_back</span>
</button>
<!-- Empty div to balance flex space if a trailing action is added later -->
<div class="w-11 h-11"></div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col px-margin-mobile pt-sm pb-[100px] w-full max-w-md mx-auto">
<!-- Security Icon -->
<div class="w-16 h-16 rounded-2xl bg-primary-container/20 flex items-center justify-center mb-lg">
<span class="material-symbols-outlined text-[32px] text-primary" style="font-variation-settings: 'FILL' 1;">shield_lock</span>
</div>
<!-- Typography Context -->
<h1 class="font-h1 text-h1 text-on-background mb-sm">Enter security code</h1>
<p class="font-body-md text-body-md text-on-surface-variant mb-xl">
            We've sent a 6-digit verification code to your device. Please enter it below to confirm your identity.
        </p>
<!-- Focused Numeric Input (OTP Grid) -->
<div class="flex justify-between items-center gap-xs mb-xl w-full">
<input aria-label="Digit 1" class="w-[48px] h-[56px] text-center font-h2 text-h2 text-on-surface bg-surface-container-lowest border border-outline-variant rounded-lg focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all shadow-sm" inputmode="numeric" maxlength="1" pattern="[0-9]*" type="text" value="8"/>
<input aria-label="Digit 2" class="w-[48px] h-[56px] text-center font-h2 text-h2 text-on-surface bg-surface-container-lowest border border-outline-variant rounded-lg focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all shadow-sm" inputmode="numeric" maxlength="1" pattern="[0-9]*" type="text" value="2"/>
<input aria-label="Digit 3" autofocus="" class="w-[48px] h-[56px] text-center font-h2 text-h2 text-on-surface bg-surface-container-lowest border border-primary ring-1 ring-primary rounded-lg outline-none transition-all shadow-sm shadow-primary/10" inputmode="numeric" maxlength="1" pattern="[0-9]*" type="text"/>
<input aria-label="Digit 4" class="w-[48px] h-[56px] text-center font-h2 text-h2 text-on-surface bg-surface-container-lowest border border-outline-variant rounded-lg focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all shadow-sm" inputmode="numeric" maxlength="1" pattern="[0-9]*" type="text"/>
<input aria-label="Digit 5" class="w-[48px] h-[56px] text-center font-h2 text-h2 text-on-surface bg-surface-container-lowest border border-outline-variant rounded-lg focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all shadow-sm" inputmode="numeric" maxlength="1" pattern="[0-9]*" type="text"/>
<input aria-label="Digit 6" class="w-[48px] h-[56px] text-center font-h2 text-h2 text-on-surface bg-surface-container-lowest border border-outline-variant rounded-lg focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all shadow-sm" inputmode="numeric" maxlength="1" pattern="[0-9]*" type="text"/>
</div>
<!-- Resend Timer Context -->
<div class="flex flex-col items-center justify-center space-y-sm mt-md">
<p class="font-body-md text-body-md text-on-surface-variant">Didn't receive the code?</p>
<button class="font-label-md text-label-md text-primary opacity-60 cursor-not-allowed flex items-center gap-1" disabled="" type="button">
<span class="material-symbols-outlined text-[16px]">schedule</span>
                Resend code in 00:42
            </button>
</div>
</main>
<!-- Sticky Primary Action Footer -->
<div class="fixed bottom-0 left-0 w-full px-margin-mobile pb-lg pt-md bg-gradient-to-t from-background via-background/95 to-transparent z-40">
<div class="w-full max-w-md mx-auto">
<button class="w-full h-[56px] bg-primary text-on-primary font-label-md text-label-md rounded-full shadow-[0_4px_12px_rgba(0,0,0,0.1)] active:scale-[0.98] transition-transform flex items-center justify-center gap-2" type="button">
                Verify
                <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</div>
</div>
