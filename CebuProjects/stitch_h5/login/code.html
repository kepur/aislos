<body class="bg-background min-h-screen flex flex-col font-['Inter'] antialiased selection:bg-primary/20">
<!-- Header / Brand Area -->
<header class="flex flex-col items-center justify-center pt-[88px] pb-lg px-margin-mobile">
<div class="w-16 h-16 rounded-2xl bg-primary text-on-primary flex items-center justify-center mb-md shadow-[0_8px_24px_rgba(36,56,156,0.25)]">
<span class="material-symbols-outlined text-[32px]" style="font-variation-settings: 'FILL' 1;">shield_lock</span>
</div>
<h1 class="font-h1 text-h1 text-on-surface text-center">{{APP_NAME}}</h1>
<p class="font-body-md text-body-md text-on-surface-variant text-center mt-xs">Secure Global Transactions</p>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow px-margin-mobile pb-xl flex flex-col w-full max-w-md mx-auto">
<!-- Login Form Card (Level 1 Elevation) -->
<div class="bg-surface-container-lowest rounded-[24px] p-lg ambient-shadow border border-outline-variant/30 flex flex-col gap-lg">
<div class="flex flex-col gap-xs">
<h2 class="font-h2 text-h2 text-on-surface">Welcome back</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Please enter your details to sign in.</p>
</div>
<form class="flex flex-col gap-md" onsubmit="event.preventDefault();">
<!-- Email/Phone Input -->
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant" for="identifier">Email or Phone</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline">person</span>
<input class="w-full h-[52px] pl-11 pr-md rounded-lg border border-outline-variant bg-surface-container-lowest font-body-md text-body-md text-on-surface placeholder:text-outline-variant focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors" id="identifier" placeholder="Enter your email or phone" type="text"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant" for="password">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline">lock</span>
<input class="w-full h-[52px] pl-11 pr-11 rounded-lg border border-outline-variant bg-surface-container-lowest font-body-md text-body-md text-on-surface placeholder:text-outline-variant focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-md top-1/2 -translate-y-1/2 text-outline hover:text-on-surface-variant transition-colors p-1 flex items-center justify-center" type="button">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
</div>
<!-- Options Row -->
<div class="flex items-center justify-between mt-xs">
<label class="flex items-center gap-sm cursor-pointer group">
<div class="relative flex items-center justify-center w-5 h-5">
<input class="peer appearance-none w-5 h-5 border-[1.5px] border-outline-variant rounded bg-surface-container-lowest checked:bg-primary checked:border-primary transition-colors cursor-pointer" type="checkbox"/>
<span class="material-symbols-outlined absolute text-[16px] text-on-primary opacity-0 peer-checked:opacity-100 pointer-events-none transition-opacity font-bold">check</span>
</div>
<span class="font-body-md text-body-md text-on-surface-variant group-hover:text-on-surface transition-colors">Remember me</span>
</label>
<a class="font-label-sm text-label-sm text-primary hover:text-on-primary-fixed-variant transition-colors" href="#">Forgot password?</a>
</div>
<!-- Submit Button -->
<button class="h-[56px] w-full mt-sm rounded-xl bg-primary text-on-primary font-label-md text-label-md flex items-center justify-center active:scale-[0.98] transition-transform shadow-[0_4px_12px_rgba(36,56,156,0.15)] relative overflow-hidden group" type="submit">
<div class="absolute inset-0 bg-white/20 opacity-0 group-active:opacity-100 transition-opacity"></div>
                    Login to your account
                </button>
</form>
<!-- Divider -->
<div class="flex items-center gap-md py-xs">
<div class="flex-grow h-px bg-outline-variant/30"></div>
<span class="font-label-sm text-label-sm text-outline">Or continue with</span>
<div class="flex-grow h-px bg-outline-variant/30"></div>
</div>
<!-- Social Login -->
<button class="h-[56px] w-full rounded-xl border border-outline-variant/50 bg-surface-container-lowest text-on-surface font-label-md text-label-md flex items-center justify-center gap-sm hover:bg-surface-container-low active:bg-surface-variant transition-colors" type="button">
<svg fill="none" height="24" viewbox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25C22.56 11.47 22.49 10.72 22.36 10H12V14.26H17.92C17.66 15.63 16.88 16.81 15.69 17.6V20.36H19.26C21.35 18.44 22.56 15.6 22.56 12.25Z" fill="#4285F4"></path>
<path d="M12 23C14.97 23 17.46 22.02 19.26 20.36L15.69 17.6C14.71 18.25 13.46 18.66 12 18.66C9.18 18.66 6.78 16.76 5.89 14.22H2.22V17.06C4.02 20.64 7.71 23 12 23Z" fill="#34A853"></path>
<path d="M5.89 14.22C5.66 13.54 5.53 12.79 5.53 12C5.53 11.21 5.66 10.46 5.89 9.78V6.94H2.22C1.48 8.42 1.05 10.15 1.05 12C1.05 13.85 1.48 15.58 2.22 17.06L5.89 14.22Z" fill="#FBBC05"></path>
<path d="M12 5.34C13.62 5.34 15.06 5.9 16.21 7L19.34 3.87C17.45 2.11 14.97 1 12 1C7.71 1 4.02 3.36 2.22 6.94L5.89 9.78C6.78 7.24 9.18 5.34 12 5.34Z" fill="#EA4335"></path>
</svg>
                Google
            </button>
</div>
<!-- Registration Link -->
<p class="font-body-md text-body-md text-on-surface-variant text-center mt-xl">
            Don't have an account? 
            <a class="font-label-md text-label-md text-primary hover:text-on-primary-fixed-variant transition-colors ml-1" href="#">Sign up</a>
</p>
</main>
<!-- Footer / Language Switcher -->
<footer class="pb-safe-bottom pb-lg pt-md flex justify-center w-full">
<button class="flex items-center gap-xs px-md py-sm rounded-full border border-outline-variant/30 bg-surface/50 backdrop-blur-sm text-on-surface-variant hover:text-on-surface hover:bg-surface-container-low transition-colors group">
<span class="material-symbols-outlined text-[18px]">language</span>
<span class="font-label-sm text-label-sm">English (US)</span>
<span class="material-symbols-outlined text-[18px] group-hover:translate-y-[2px] transition-transform">arrow_drop_down</span>
</button>
</footer>
</body></html>
