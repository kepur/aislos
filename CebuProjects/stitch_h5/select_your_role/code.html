<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" name="viewport"/>
<title>Role Selection - {{APP_NAME}}</title>
<!-- Google Fonts & Material Symbols -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Design System Configuration -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary-fixed-variant": "#293ca0",
                        "error-container": "#ffdad6",
                        "inverse-surface": "#213145",
                        "surface-tint": "#4355b9",
                        "primary-fixed-dim": "#bac3ff",
                        "on-primary-fixed": "#00105c",
                        "primary-fixed": "#dee0ff",
                        "on-tertiary-fixed": "#301400",
                        "surface-dim": "#cbdbf5",
                        "surface-container-high": "#dce9ff",
                        "on-surface": "#0b1c30",
                        "inverse-primary": "#bac3ff",
                        "background": "#f8f9ff",
                        "surface-bright": "#f8f9ff",
                        "outline-variant": "#c5c5d4",
                        "on-tertiary-fixed-variant": "#713700",
                        "on-secondary-fixed-variant": "#354282",
                        "on-secondary-fixed": "#021355",
                        "outline": "#757684",
                        "secondary-fixed": "#dee1ff",
                        "on-error-container": "#93000a",
                        "surface-container-lowest": "#ffffff",
                        "inverse-on-surface": "#eaf1ff",
                        "tertiary": "#6c3400",
                        "error": "#ba1a1a",
                        "tertiary-fixed": "#ffdcc6",
                        "surface-variant": "#d3e4fe",
                        "secondary": "#4d5a9c",
                        "on-secondary": "#ffffff",
                        "on-primary": "#ffffff",
                        "tertiary-fixed-dim": "#ffb784",
                        "on-tertiary-container": "#ffc7a2",
                        "on-secondary-container": "#394687",
                        "on-primary-container": "#cacfff",
                        "surface-container-low": "#eff4ff",
                        "tertiary-container": "#8f4700",
                        "secondary-container": "#abb7ff",
                        "primary-container": "#3f51b5",
                        "on-tertiary": "#ffffff",
                        "surface": "#f8f9ff",
                        "on-background": "#0b1c30",
                        "surface-container-highest": "#d3e4fe",
                        "primary": "#24389c",
                        "on-error": "#ffffff",
                        "surface-container": "#e5eeff",
                        "secondary-fixed-dim": "#b9c3ff",
                        "on-surface-variant": "#454652"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "sm": "8px",
                        "md": "16px",
                        "gutter-mobile": "12px",
                        "xs": "4px",
                        "margin-mobile": "16px",
                        "lg": "24px",
                        "xl": "32px",
                        "base": "4px",
                        "safe": "env(safe-area-inset-bottom, 24px)"
                    },
                    "fontFamily": {
                        "h1": ["Inter"],
                        "label-md": ["Inter"],
                        "h3": ["Inter"],
                        "body-md": ["Inter"],
                        "body-lg": ["Inter"],
                        "label-sm": ["Inter"],
                        "h2": ["Inter"]
                    },
                    "fontSize": {
                        "h1": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "label-md": ["14px", { "lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "600" }],
                        "h3": ["18px", { "lineHeight": "24px", "letterSpacing": "0", "fontWeight": "600" }],
                        "body-md": ["14px", { "lineHeight": "20px", "letterSpacing": "0", "fontWeight": "400" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "letterSpacing": "0", "fontWeight": "400" }],
                        "label-sm": ["12px", { "lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "500" }],
                        "h2": ["20px", { "lineHeight": "28px", "letterSpacing": "-0.01em", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style>
        /* Base utilities for seamless safe area handling */
        body {
            -webkit-tap-highlight-color: transparent;
        }
        .pb-safe {
            padding-bottom: env(safe-area-inset-bottom, 24px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md antialiased min-h-screen flex flex-col selection:bg-primary-container selection:text-on-primary-container">
<!-- Note: TopAppBar and BottomNavBar are deliberately suppressed here as this is a transactional Onboarding/Registration flow, adhering to the Shell Visibility & Relevance mandate. -->
<main class="flex-1 flex flex-col px-margin-mobile pt-xl pb-safe w-full max-w-md mx-auto">
<!-- Header -->
<header class="mb-xl text-center">
<div class="inline-flex items-center justify-center w-12 h-12 rounded-xl bg-primary-container text-on-primary-container mb-md">
<span class="material-symbols-outlined text-[28px]" style="font-variation-settings: 'FILL' 1;">account_circle</span>
</div>
<h1 class="font-h1 text-h1 text-on-surface mb-xs">Select your role</h1>
<p class="font-body-md text-body-md text-on-surface-variant px-sm">
                How do you plan to use {{APP_NAME}}? You can change this later in settings.
            </p>
</header>
<!-- Role Selection Cards -->
<form class="flex flex-col gap-md flex-1">
<!-- Buyer Card (Shown in Active/Selected State for UI demonstration) -->
<label class="relative flex flex-col p-lg rounded-xl border-2 border-primary bg-surface-container-low shadow-[0_4px_20px_rgba(0,0,0,0.05)] cursor-pointer transition-all active:scale-[0.98]">
<input checked="" class="sr-only" name="account_role" type="radio" value="buyer"/>
<div class="flex items-start justify-between mb-md">
<div class="w-12 h-12 rounded-full bg-primary text-on-primary flex items-center justify-center shadow-sm">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">shopping_bag</span>
</div>
<!-- Custom Radio Indicator -->
<div class="w-6 h-6 rounded-full border-2 border-primary bg-primary flex items-center justify-center">
<span class="material-symbols-outlined text-[16px] text-on-primary font-bold">check</span>
</div>
</div>
<h2 class="font-h2 text-h2 text-on-surface mb-xs">I am a Buyer</h2>
<p class="font-body-md text-body-md text-on-surface-variant">
                    Post requests for products or services, review incoming offers, and pay securely into escrow.
                </p>
</label>
<!-- Supplier Card (Shown in Inactive/Unselected State) -->
<label class="relative flex flex-col p-lg rounded-xl border border-outline-variant bg-surface-container-lowest shadow-sm hover:shadow-[0_4px_20px_rgba(0,0,0,0.04)] cursor-pointer transition-all active:scale-[0.98]">
<input class="sr-only" name="account_role" type="radio" value="supplier"/>
<div class="flex items-start justify-between mb-md">
<div class="w-12 h-12 rounded-full bg-surface-variant text-on-surface-variant flex items-center justify-center">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">storefront</span>
</div>
<!-- Custom Radio Indicator -->
<div class="w-6 h-6 rounded-full border-2 border-outline-variant flex items-center justify-center">
</div>
</div>
<h2 class="font-h2 text-h2 text-on-surface mb-xs">I am a Supplier</h2>
<p class="font-body-md text-body-md text-on-surface-variant">
                    Receive relevant pings, submit competitive offers to buyers, and fulfill orders to grow your business.
                </p>
</label>
<!-- Sticky Bottom Action -->
<div class="mt-auto pt-xl pb-lg">
<button class="w-full h-[56px] rounded-lg bg-primary text-on-primary font-label-md text-label-md flex items-center justify-center shadow-sm hover:bg-surface-tint transition-colors active:scale-[0.98]" type="button">
                    Continue Registration
                </button>
<p class="text-center font-label-sm text-label-sm text-on-surface-variant mt-md">
                    Already have an account? <a class="text-primary font-semibold hover:text-surface-tint" href="#">Log in</a>
</p>
</div>
</form>
</main>
</body></html>
