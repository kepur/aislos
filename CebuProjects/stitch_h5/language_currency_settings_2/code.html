<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" name="viewport"/>
<title>Internationalization Settings</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "background": "#f8f9ff",
                        "surface-bright": "#f8f9ff",
                        "outline-variant": "#c5c5d4",
                        "on-tertiary-fixed-variant": "#713700",
                        "on-secondary-fixed": "#021355",
                        "on-secondary-fixed-variant": "#354282",
                        "outline": "#757684",
                        "secondary-fixed": "#dee1ff",
                        "on-error-container": "#93000a",
                        "error-container": "#ffdad6",
                        "on-primary-fixed-variant": "#293ca0",
                        "surface-tint": "#4355b9",
                        "primary-fixed-dim": "#bac3ff",
                        "inverse-surface": "#213145",
                        "on-primary-fixed": "#00105c",
                        "on-tertiary-fixed": "#301400",
                        "primary-fixed": "#dee0ff",
                        "surface-dim": "#cbdbf5",
                        "surface-container-high": "#dce9ff",
                        "on-surface": "#0b1c30",
                        "inverse-primary": "#bac3ff",
                        "on-tertiary-container": "#ffc7a2",
                        "on-secondary-container": "#394687",
                        "on-primary-container": "#cacfff",
                        "tertiary-fixed-dim": "#ffb784",
                        "surface-container-low": "#eff4ff",
                        "primary-container": "#3f51b5",
                        "tertiary-container": "#8f4700",
                        "secondary-container": "#abb7ff",
                        "on-tertiary": "#ffffff",
                        "surface": "#f8f9ff",
                        "surface-container-highest": "#d3e4fe",
                        "on-background": "#0b1c30",
                        "primary": "#24389c",
                        "on-error": "#ffffff",
                        "secondary-fixed-dim": "#b9c3ff",
                        "on-surface-variant": "#454652",
                        "surface-container": "#e5eeff",
                        "surface-container-lowest": "#ffffff",
                        "inverse-on-surface": "#eaf1ff",
                        "tertiary": "#6c3400",
                        "error": "#ba1a1a",
                        "tertiary-fixed": "#ffdcc6",
                        "on-primary": "#ffffff",
                        "surface-variant": "#d3e4fe",
                        "secondary": "#4d5a9c",
                        "on-secondary": "#ffffff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "xs": "4px",
                        "sm": "8px",
                        "md": "16px",
                        "gutter-mobile": "12px",
                        "xl": "32px",
                        "base": "4px",
                        "margin-mobile": "16px",
                        "lg": "24px"
                    },
                    "fontFamily": {
                        "label-sm": ["Inter"],
                        "h2": ["Inter"],
                        "body-lg": ["Inter"],
                        "body-md": ["Inter"],
                        "label-md": ["Inter"],
                        "h3": ["Inter"],
                        "h1": ["Inter"]
                    },
                    "fontSize": {
                        "label-sm": ["12px", { "lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "500" }],
                        "h2": ["20px", { "lineHeight": "28px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "letterSpacing": "0", "fontWeight": "400" }],
                        "body-md": ["14px", { "lineHeight": "20px", "letterSpacing": "0", "fontWeight": "400" }],
                        "label-md": ["14px", { "lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "600" }],
                        "h3": ["18px", { "lineHeight": "24px", "letterSpacing": "0", "fontWeight": "600" }],
                        "h1": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "700" }]
                    }
                }
            }
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col pb-safe">
<!-- TopAppBar -->
<header class="bg-white/95 dark:bg-slate-900/95 backdrop-blur-md fixed top-0 w-full z-50 border-b border-slate-100 dark:border-slate-800 shadow-sm flex items-center justify-between px-4 h-14 w-full">
<div class="tap-highlight-transparent cursor-pointer flex items-center justify-center text-slate-500 dark:text-slate-400 active:opacity-70 transition-opacity">
<span class="material-symbols-outlined" data-icon="sync_alt">sync_alt</span>
</div>
<div class="text-lg font-bold text-indigo-600 dark:text-indigo-400 font-['Inter'] text-sm font-medium tracking-tight">
            Internationalization Settings
        </div>
<div class="tap-highlight-transparent cursor-pointer flex items-center justify-center text-slate-500 dark:text-slate-400 active:opacity-70 transition-opacity">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 mt-14 p-margin-mobile flex flex-col gap-sm overflow-y-auto">
<!-- Section: Localization -->
<div class="bg-surface-container-lowest rounded-xl shadow-[0_4px_12px_0px_rgba(0,0,0,0.05)] overflow-hidden">
<div class="px-md py-sm border-b border-outline-variant/30 bg-surface-container/30">
<h3 class="font-h3 text-h3 text-on-surface">Localization</h3>
</div>
<div class="flex flex-col">
<!-- Language Selection -->
<button class="w-full flex items-center justify-between px-md py-md border-b border-outline-variant/30 active:bg-surface-container-low transition-colors">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-outline" data-icon="language">language</span>
<div class="text-left">
<span class="font-body-md text-body-md text-on-surface block">Language</span>
<span class="font-label-sm text-label-sm text-outline block mt-xs">English (US)</span>
</div>
</div>
<span class="material-symbols-outlined text-outline" data-icon="chevron_right">chevron_right</span>
</button>
<!-- Region Selection -->
<button class="w-full flex items-center justify-between px-md py-md border-b border-outline-variant/30 active:bg-surface-container-low transition-colors">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-outline" data-icon="public">public</span>
<div class="text-left">
<span class="font-body-md text-body-md text-on-surface block">Region</span>
<span class="font-label-sm text-label-sm text-outline block mt-xs">United States</span>
</div>
</div>
<span class="material-symbols-outlined text-outline" data-icon="chevron_right">chevron_right</span>
</button>
<!-- Timezone Selection -->
<button class="w-full flex items-center justify-between px-md py-md active:bg-surface-container-low transition-colors">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-outline" data-icon="schedule">schedule</span>
<div class="text-left">
<span class="font-body-md text-body-md text-on-surface block">Timezone</span>
<span class="font-label-sm text-label-sm text-outline block mt-xs">Pacific Time (PT)</span>
</div>
</div>
<span class="material-symbols-outlined text-outline" data-icon="chevron_right">chevron_right</span>
</button>
</div>
</div>
<!-- Section: Formatting -->
<div class="bg-surface-container-lowest rounded-xl shadow-[0_4px_12px_0px_rgba(0,0,0,0.05)] overflow-hidden mt-sm">
<div class="px-md py-sm border-b border-outline-variant/30 bg-surface-container/30">
<h3 class="font-h3 text-h3 text-on-surface">Formatting &amp; Units</h3>
</div>
<div class="flex flex-col">
<!-- Currency Selection -->
<button class="w-full flex items-center justify-between px-md py-md border-b border-outline-variant/30 active:bg-surface-container-low transition-colors">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-outline" data-icon="payments">payments</span>
<div class="text-left">
<span class="font-body-md text-body-md text-on-surface block">Primary Currency</span>
<span class="font-label-sm text-label-sm text-outline block mt-xs">USD ($)</span>
</div>
</div>
<span class="material-symbols-outlined text-outline" data-icon="chevron_right">chevron_right</span>
</button>
<!-- Measurement Units -->
<button class="w-full flex items-center justify-between px-md py-md active:bg-surface-container-low transition-colors">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-outline" data-icon="straighten">straighten</span>
<div class="text-left">
<span class="font-body-md text-body-md text-on-surface block">Measurement Units</span>
<span class="font-label-sm text-label-sm text-outline block mt-xs">Imperial (lbs, in)</span>
</div>
</div>
<span class="material-symbols-outlined text-outline" data-icon="chevron_right">chevron_right</span>
</button>
</div>
</div>
<!-- Action Button -->
<div class="mt-lg">
<button class="w-full bg-primary text-on-primary font-label-md text-label-md h-[56px] rounded-lg shadow-sm active:bg-primary/90 transition-colors flex items-center justify-center">
                Save Changes
            </button>
</div>
</main>
<!-- BottomNavBar (Settings Context - Suppressed per rules, but included here based on JSON if forced, though rules say suppress on Settings. Omitting per "Semantic Shell Mandate: Automatic Suppression for Task-Focused/Settings".) -->
<!-- Navigation intentionally omitted for settings screen focus -->
</body></html>
