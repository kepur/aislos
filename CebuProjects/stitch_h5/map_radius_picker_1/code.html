<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Map Radius Picker</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "background": "#f8f9ff",
                    "surface-bright": "#f8f9ff",
                    "outline-variant": "#c5c5d4",
                    "on-tertiary-fixed-variant": "#713700",
                    "on-secondary-fixed": "#021355",
                    "on-secondary-fixed-variant": "#354282",
                    "outline": "#757684",
                    "secondary-fixed": "#dee1ff",
                    "on-error-container": "#93000a",
                    "error-container": "#ffdad6",
                    "on-primary-fixed-variant": "#293ca0",
                    "surface-tint": "#4355b9",
                    "primary-fixed-dim": "#bac3ff",
                    "inverse-surface": "#213145",
                    "on-primary-fixed": "#00105c",
                    "on-tertiary-fixed": "#301400",
                    "primary-fixed": "#dee0ff",
                    "surface-dim": "#cbdbf5",
                    "surface-container-high": "#dce9ff",
                    "on-surface": "#0b1c30",
                    "inverse-primary": "#bac3ff",
                    "on-tertiary-container": "#ffc7a2",
                    "on-secondary-container": "#394687",
                    "on-primary-container": "#cacfff",
                    "tertiary-fixed-dim": "#ffb784",
                    "surface-container-low": "#eff4ff",
                    "primary-container": "#3f51b5",
                    "tertiary-container": "#8f4700",
                    "secondary-container": "#abb7ff",
                    "on-tertiary": "#ffffff",
                    "surface": "#f8f9ff",
                    "surface-container-highest": "#d3e4fe",
                    "on-background": "#0b1c30",
                    "primary": "#24389c",
                    "on-error": "#ffffff",
                    "secondary-fixed-dim": "#b9c3ff",
                    "on-surface-variant": "#454652",
                    "surface-container": "#e5eeff",
                    "surface-container-lowest": "#ffffff",
                    "inverse-on-surface": "#eaf1ff",
                    "tertiary": "#6c3400",
                    "error": "#ba1a1a",
                    "tertiary-fixed": "#ffdcc6",
                    "on-primary": "#ffffff",
                    "surface-variant": "#d3e4fe",
                    "secondary": "#4d5a9c",
                    "on-secondary": "#ffffff"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "xs": "4px",
                    "sm": "8px",
                    "md": "16px",
                    "gutter-mobile": "12px",
                    "xl": "32px",
                    "base": "4px",
                    "margin-mobile": "16px",
                    "lg": "24px"
            },
            "fontFamily": {
                    "label-sm": ["Inter"],
                    "h2": ["Inter"],
                    "body-lg": ["Inter"],
                    "body-md": ["Inter"],
                    "label-md": ["Inter"],
                    "h3": ["Inter"],
                    "h1": ["Inter"]
            },
            "fontSize": {
                    "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "500"}],
                    "h2": ["20px", {"lineHeight": "28px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                    "body-lg": ["16px", {"lineHeight": "24px", "letterSpacing": "0", "fontWeight": "400"}],
                    "body-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0", "fontWeight": "400"}],
                    "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "600"}],
                    "h3": ["18px", {"lineHeight": "24px", "letterSpacing": "0", "fontWeight": "600"}],
                    "h1": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "700"}]
            }
          }
        }
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Hide scrollbar for horizontal scrolling */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
        /* Custom range slider styling */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: #24389c; /* primary color */
            cursor: pointer;
            margin-top: -10px; /* You need to specify a margin in Chrome, but in Firefox and IE it is automatic */
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #c5c5d4; /* outline-variant */
            border-radius: 2px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md antialiased overflow-hidden select-none">
<!-- Main Container (Task Focused, Full Screen) -->
<div class="relative w-full h-[884px] flex flex-col bg-surface-container-low">
<!-- Map Background -->
<div class="absolute inset-0 z-0">
<img alt="Map background" class="w-full h-full object-cover opacity-60 grayscale-[30%]" data-alt="A highly detailed overhead map view of a modern metropolitan financial district. The map styling is clean, corporate, and utilizes a soft minimal palette with subtle tonal shifts of pristine whites, cool slate greys, and faint grid lines. The lighting is high-key and bright, evoking a professional light-mode digital interface aesthetic. The mood is structured, authoritative, and frictionless." data-location="San Francisco Financial District Map" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA6PRBEVJpgUVI-wwZE-UBoJ8VJPB36nS_Nk1oWMIRWVmdM0MQbMApvEgB849yh42B-SwbadGvTKDysCwS56yHxSvGoSOFQsUMpGkQunbOWlMcQKc0VfqkTEvlrmNqTv2t9vpRccBM2VnvzaB5M241b1pFZF9uwRIkBV61NaLR9duHwsC8g5EYcEUagjxuWmy00sAAY7aKU6SRnWdkNH8bWhXby1Hzff8mfhQnfyHXlrVzhTID7J8n7fP4QXrxpJBRhBEudNMihI0M"/>
</div>
<!-- Radius Overlay (CSS representation) -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[280px] h-[280px] z-10 pointer-events-none">
<div class="w-full h-full rounded-full bg-primary/10 border-2 border-primary/30 relative">
<!-- Measurement line -->
<div class="absolute top-1/2 left-1/2 w-1/2 h-px bg-primary/40 origin-left">
<span class="absolute right-0 -top-6 font-label-sm text-label-sm text-primary px-1 bg-surface-bright/80 backdrop-blur-sm rounded">10 km</span>
</div>
</div>
</div>
<!-- Central Pin -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-full z-20 pb-1 flex flex-col items-center drop-shadow-md pointer-events-none">
<span class="material-symbols-outlined text-[40px] text-primary" style="font-variation-settings: 'FILL' 1;">location_on</span>
<div class="w-2 h-1 bg-on-surface/20 rounded-[100%] absolute bottom-1 -z-10 blur-[1px]"></div>
</div>
<!-- Top Search Overlay -->
<div class="absolute top-0 left-0 w-full px-margin-mobile pt-12 pb-4 z-30 pointer-events-auto">
<div class="flex items-center gap-sm">
<!-- Back Button (Task departure) -->
<button class="w-11 h-11 flex items-center justify-center bg-surface-bright rounded-full shadow-[0_4px_12px_0px_rgba(0,0,0,0.05)] text-on-surface active:bg-surface-container transition-colors">
<span class="material-symbols-outlined text-xl">arrow_back</span>
</button>
<!-- Search Card -->
<div class="flex-1 bg-surface-bright rounded-xl px-4 py-2 shadow-[0_4px_12px_0px_rgba(0,0,0,0.05)] border border-outline-variant/30 flex flex-col justify-center min-h-[52px]">
<label class="font-label-sm text-label-sm text-on-surface-variant mb-0.5">Search Location</label>
<div class="flex items-center gap-sm w-full">
<span class="material-symbols-outlined text-outline text-lg">search</span>
<input class="flex-1 bg-transparent border-none p-0 m-0 font-body-md text-body-md text-on-surface focus:ring-0 truncate" type="text" value="Financial District, SF"/>
<button class="material-symbols-outlined text-outline text-lg active:text-on-surface">cancel</button>
</div>
</div>
</div>
</div>
<!-- Spacer to push bottom sheet down -->
<div class="flex-1 z-10 pointer-events-none"></div>
<!-- Bottom Sheet Controls (Level 2 Elevation) -->
<div class="bg-surface-bright w-full rounded-t-xl shadow-[0_-4px_20px_0px_rgba(0,0,0,0.08)] z-30 pointer-events-auto pb-8 pt-2 flex flex-col">
<!-- Drag Handle -->
<div class="w-12 h-1.5 bg-outline-variant/50 rounded-full mx-auto mb-4"></div>
<div class="px-margin-mobile flex flex-col gap-lg">
<!-- Header & Supplier Count -->
<div class="flex flex-col gap-sm">
<div class="flex items-center justify-between">
<h2 class="font-h2 text-h2 text-on-surface">Radius: 10 km</h2>
</div>
<!-- Trust Indicator / Supplier Count -->
<div class="flex items-center gap-xs bg-surface-container-high px-3 py-2 rounded-lg w-fit border border-surface-container-highest">
<span class="material-symbols-outlined text-primary text-sm" style="font-variation-settings: 'FILL' 1;">verified_user</span>
<span class="font-label-md text-label-md text-on-surface">14 Verified Suppliers in range</span>
</div>
</div>
<!-- Radius Controls -->
<div class="flex flex-col gap-md mt-2">
<!-- Slider -->
<div class="px-2">
<input class="w-full" max="50" min="1" type="range" value="10"/>
</div>
<!-- Chips -->
<div class="flex overflow-x-auto no-scrollbar gap-sm pb-1">
<button class="whitespace-nowrap px-4 py-2 rounded-full border border-outline-variant bg-surface text-on-surface-variant font-label-md text-label-md active:bg-surface-container transition-colors">1 km</button>
<button class="whitespace-nowrap px-4 py-2 rounded-full border border-outline-variant bg-surface text-on-surface-variant font-label-md text-label-md active:bg-surface-container transition-colors">5 km</button>
<button class="whitespace-nowrap px-4 py-2 rounded-full border border-transparent bg-primary-container text-on-primary-container font-label-md text-label-md shadow-sm">10 km</button>
<button class="whitespace-nowrap px-4 py-2 rounded-full border border-outline-variant bg-surface text-on-surface-variant font-label-md text-label-md active:bg-surface-container transition-colors">25 km</button>
<button class="whitespace-nowrap px-4 py-2 rounded-full border border-outline-variant bg-surface text-on-surface-variant font-label-md text-label-md active:bg-surface-container transition-colors">50 km</button>
</div>
</div>
<!-- Primary Action -->
<button class="w-full h-[56px] bg-primary text-on-primary font-label-md text-label-md rounded-lg shadow-sm active:shadow-inner active:bg-primary/95 transition-all flex items-center justify-center gap-sm mt-2">
                    Confirm Location
                </button>
</div>
</div>
</div>
</body></html>
