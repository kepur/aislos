<body class="bg-background min-h-screen flex flex-col font-body-md text-body-md text-on-background">
<!-- Suppressed TopNavBar for Linear/Transactional intent (Registration) -->
<main class="flex-grow flex items-center justify-center p-md md:p-lg">
<div class="w-full max-w-lg bg-surface-container-lowest border border-surface-variant rounded-xl shadow-[0px_12px_32px_rgba(0,0,0,0.1)] p-lg relative overflow-hidden">
<div class="absolute top-0 left-0 w-full h-1 bg-primary"></div>
<div class="mb-lg text-center">
<h1 class="font-h1 text-h1 text-on-background mb-sm">Create your Buyer Account</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Join ProcurePing to access secure enterprise procurement.</p>
</div>
<form class="space-y-sm">
<div class="space-y-xs">
<label class="block font-label-caps text-label-caps text-on-surface-variant uppercase" for="fullName">Full Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline" data-icon="person">person</span>
<input class="w-full pl-10 pr-3 py-2 bg-surface border border-outline-variant rounded focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors font-body-sm text-body-sm text-on-background placeholder-on-surface-variant/50" id="fullName" placeholder="Jane Doe" type="text"/>
</div>
</div>
<div class="space-y-xs">
<label class="block font-label-caps text-label-caps text-on-surface-variant uppercase" for="email">Business Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline" data-icon="mail">mail</span>
<input class="w-full pl-10 pr-3 py-2 bg-surface border border-outline-variant rounded focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors font-body-sm text-body-sm text-on-background placeholder-on-surface-variant/50" id="email" placeholder="jane@company.com" type="email"/>
</div>
</div>
<div class="space-y-xs">
<label class="block font-label-caps text-label-caps text-on-surface-variant uppercase" for="phone">Phone Number</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline" data-icon="call">call</span>
<input class="w-full pl-10 pr-3 py-2 bg-surface border border-outline-variant rounded focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors font-body-sm text-body-sm text-on-background placeholder-on-surface-variant/50" id="phone" placeholder="+1 (555) 000-0000" type="tel"/>
</div>
</div>
<div class="space-y-xs">
<label class="block font-label-caps text-label-caps text-on-surface-variant uppercase" for="password">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline" data-icon="lock">lock</span>
<input class="w-full pl-10 pr-10 py-2 bg-surface border border-outline-variant rounded focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors font-body-sm text-body-sm text-on-background placeholder-on-surface-variant/50" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface-variant transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-sm">
<div class="space-y-xs">
<label class="block font-label-caps text-label-caps text-on-surface-variant uppercase" for="country">Country</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline" data-icon="public">public</span>
<select class="w-full pl-10 pr-10 py-2 bg-surface border border-outline-variant rounded focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors font-body-sm text-body-sm text-on-background appearance-none" id="country">
<option disabled="" selected="" value="">Select Country</option>
<option value="US">United States</option>
<option value="UK">United Kingdom</option>
<option value="CA">Canada</option>
<option value="AU">Australia</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-outline pointer-events-none" data-icon="expand_more">expand_more</span>
</div>
</div>
<div class="space-y-xs">
<label class="block font-label-caps text-label-caps text-on-surface-variant uppercase" for="city">City</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline" data-icon="location_city">location_city</span>
<input class="w-full pl-10 pr-3 py-2 bg-surface border border-outline-variant rounded focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors font-body-sm text-body-sm text-on-background placeholder-on-surface-variant/50" id="city" placeholder="e.g. New York" type="text"/>
</div>
</div>
</div>
<div class="space-y-xs">
<label class="block font-label-caps text-label-caps text-on-surface-variant uppercase" for="currency">Preferred Currency</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline" data-icon="payments">payments</span>
<select class="w-full pl-10 pr-10 py-2 bg-surface border border-outline-variant rounded focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors font-body-sm text-body-sm text-on-background appearance-none" id="currency">
<option value="USD">🇺🇸 USD - US Dollar</option>
<option value="EUR">🇪🇺 EUR - Euro</option>
<option value="GBP">🇬🇧 GBP - British Pound</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-outline pointer-events-none" data-icon="expand_more">expand_more</span>
</div>
</div>
<div class="pt-sm pb-md">
<label class="flex items-start gap-xs cursor-pointer group">
<div class="relative flex items-center justify-center mt-1">
<input class="w-4 h-4 bg-surface border border-outline-variant rounded appearance-none checked:bg-primary checked:border-primary focus:outline-none focus:ring-2 focus:ring-primary/20 transition-colors cursor-pointer peer" type="checkbox"/>
<span class="material-symbols-outlined absolute text-on-primary text-[12px] opacity-0 peer-checked:opacity-100 pointer-events-none" data-icon="check" data-weight="fill" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
<span class="font-body-sm text-body-sm text-on-surface-variant group-hover:text-on-background transition-colors">
                            I agree to the <a class="text-primary hover:underline" href="#">Terms of Service</a> and <a class="text-primary hover:underline" href="#">Privacy Policy</a>.
                        </span>
</label>
</div>
<button class="w-full bg-primary hover:bg-primary-container text-on-primary font-body-md text-body-md font-medium py-3 px-6 rounded transition-colors active:scale-[0.98]" type="submit">
                    Create Account
                </button>
</form>
<div class="mt-lg text-center font-body-sm text-body-sm text-on-surface-variant">
                Already have an account? <a class="text-primary font-medium hover:underline" href="#">Sign In</a>
</div>
</div>
</main>
<!-- Suppressed Footer for Linear/Transactional intent -->
</body></html>
