<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - ProcurePing</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                        "on-tertiary-container": "#fffbff",
                        "on-secondary-container": "#00667c",
                        "on-primary-container": "#fffbff",
                        "tertiary-fixed-dim": "#cec7a5",
                        "surface-container-low": "#f3f3f4",
                        "on-primary": "#ffffff",
                        "surface-variant": "#e2e2e2",

                        "on-secondary": "#ffffff",

                        "secondary-fixed": "#b4ebff",

<body class="bg-surface text-on-surface font-body-md min-h-screen flex flex-col selection:bg-primary-container selection:text-on-primary-container">
<!-- Minimal Header for Linear Flow -->
<header class="w-full flex justify-between items-center px-10 h-16 mx-auto max-w-[1440px] absolute top-0 left-0 right-0 z-50">
<div class="text-xl font-black tracking-tighter text-on-background flex items-center gap-2">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">assured_workload</span>
            ProcurePing
        </div>
<div class="flex items-center gap-xs text-on-surface-variant font-body-sm hover:text-on-surface transition-colors cursor-pointer group">
<span class="material-symbols-outlined text-[18px]">language</span>
<span>English (US)</span>
<span class="material-symbols-outlined text-[18px] group-hover:translate-y-0.5 transition-transform">expand_more</span>
</div>
</header>
<!-- Main Auth Canvas -->
<main class="flex-grow flex items-center justify-center p-sm mt-16 md:mt-0">
<div class="w-full max-w-[440px]">
<!-- Auth Card -->
<div class="bg-surface-container-lowest rounded-xl shadow-[0px_12px_32px_rgba(0,0,0,0.05)] border border-surface-variant p-lg flex flex-col gap-md">
<div class="text-center flex flex-col gap-xs mb-sm">
<h1 class="font-h1 text-h1 text-on-background">Welcome back</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Log in to your ProcurePing dashboard.</p>
</div>
<form class="flex flex-col gap-md">
<!-- Email / Phone Input -->
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-on-surface" for="identifier">Email or Phone</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-sm text-on-surface-variant">person</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-DEFAULT py-xs pl-xl pr-sm font-body-sm text-body-sm text-on-surface focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-colors placeholder:text-on-surface-variant/50 h-[44px]" id="identifier" placeholder="Enter your email or phone" type="text"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-xs">
<div class="flex justify-between items-center">
<label class="font-label-caps text-label-caps text-on-surface" for="password">Password</label>
<a class="font-body-sm text-body-sm text-primary hover:text-primary-container transition-colors font-medium" href="#">Forgot password?</a>
</div>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-sm text-on-surface-variant">lock</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-DEFAULT py-xs pl-xl pr-xl font-body-sm text-body-sm text-on-surface focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-colors placeholder:text-on-surface-variant/50 h-[44px]" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-sm text-on-surface-variant hover:text-on-surface transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center gap-xs">
<input class="rounded-[2px] border-outline-variant text-primary focus:ring-primary h-[16px] w-[16px] cursor-pointer" id="remember" type="checkbox"/>
<label class="font-body-sm text-body-sm text-on-surface-variant cursor-pointer select-none" for="remember">Remember me for 30 days</label>
</div>
<!-- Actions -->
<div class="flex flex-col gap-sm mt-xs">
<button class="w-full bg-primary text-on-primary font-body-md text-body-md font-medium h-[48px] rounded-DEFAULT hover:bg-primary-container active:scale-[0.98] transition-all flex items-center justify-center gap-xs shadow-sm" type="submit">
                            Log In
                            <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
<div class="relative flex items-center py-xs">
<div class="flex-grow border-t border-surface-variant"></div>
<span class="flex-shrink-0 mx-sm font-label-caps text-label-caps text-on-surface-variant bg-surface-container-lowest px-xs">OR</span>
<div class="flex-grow border-t border-surface-variant"></div>
</div>
<button class="w-full bg-surface-container-lowest text-on-surface border border-outline-variant font-body-md text-body-md font-medium h-[48px] rounded-DEFAULT hover:bg-surface-container-low active:scale-[0.98] transition-all flex items-center justify-center gap-sm" type="button">
<!-- SVG Google Icon for standalone visual independence without external heavy deps if possible, but instructed to use material/standard where possible. We'll simulate standard generic SSO styling per SaaS norms. -->
<svg class="w-5 h-5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                            Sign in with Google
                        </button>
</div>
</form>
</div>
<div class="text-center mt-md">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                    Don't have an account? <a class="text-primary hover:text-primary-container font-medium transition-colors" href="#">Request Access</a>
</p>
</div>
</div>
</main>
<!-- Suppressed Nav/Footer for Transactional Flow per Design System -->
</body></html>
