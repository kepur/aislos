<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ProcurePing - Join the Global Procurement Network</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "primary": "#b6171d",
                    "on-error": "#ffffff",
                    "secondary-fixed-dim": "#7dd2ee",
                    "on-surface-variant": "#5b403d",
                    "surface-container": "#eeeeee",
                    "surface": "#f9f9f9",
                    "surface-container-highest": "#e2e2e2",
                    "on-background": "#1a1c1c",
                    "primary-container": "#da3432",
                    "tertiary-container": "#7a7558",
                    "secondary-container": "#8fe3ff",
                    "on-tertiary": "#ffffff",
                    "on-tertiary-container": "#fffbff",
                    "on-secondary-container": "#00667c",
                    "on-primary-container": "#fffbff",
                    "tertiary-fixed-dim": "#cec7a5",
                    "surface-container-low": "#f3f3f4",
                    "on-primary": "#ffffff",
                    "surface-variant": "#e2e2e2",
                    "secondary": "#00677d",
                    "on-secondary": "#ffffff",
                    "tertiary-fixed": "#ebe3c0",
                    "tertiary": "#615c41",
                    "error": "#ba1a1a",
                    "surface-container-lowest": "#ffffff",
                    "inverse-on-surface": "#f0f1f1",
                    "outline": "#8f6f6c",
                    "secondary-fixed": "#b4ebff",
                    "on-error-container": "#93000a",
                    "on-secondary-fixed": "#001f27",
                    "on-secondary-fixed-variant": "#004e5f",
                    "surface-bright": "#f9f9f9",
                    "outline-variant": "#e4beba",
                    "on-tertiary-fixed-variant": "#4b472d",
                    "background": "#f9f9f9",
                    "surface-dim": "#dadada",
                    "surface-container-high": "#e8e8e8",
                    "on-surface": "#1a1c1c",
                    "inverse-primary": "#ffb3ac",
                    "on-tertiary-fixed": "#1f1c06",
                    "primary-fixed": "#ffdad6",
                    "surface-tint": "#ba1a1f",
                    "primary-fixed-dim": "#ffb3ac",
                    "inverse-surface": "#2f3131",
                    "on-primary-fixed": "#410003",
                    "error-container": "#ffdad6",
                    "on-primary-fixed-variant": "#93000f"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "spacing": {
                    "gutter": "24px",
                    "container-max": "1280px",
                    "xl": "64px",
                    "base": "4px",
                    "lg": "40px",
                    "xs": "8px",
                    "sm": "16px",
                    "md": "24px"
            },
            "fontFamily": {
                    "display": ["Inter"],
                    "body-md": ["Inter"],
                    "data-mono": ["Inter"],
                    "h2": ["Inter"],
                    "h3": ["Inter"],
                    "h1": ["Inter"],
                    "body-sm": ["Inter"],
                    "body-lg": ["Inter"],
                    "label-caps": ["Inter"]
            },
            "fontSize": {
                    "display": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "body-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}],
                    "data-mono": ["14px", {"lineHeight": "1", "fontWeight": "500"}],
                    "h2": ["24px", {"lineHeight": "1.3", "fontWeight": "600"}],
                    "h3": ["20px", {"lineHeight": "1.4", "fontWeight": "600"}],
                    "h1": ["32px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "600"}],
                    "body-sm": ["14px", {"lineHeight": "1.5", "fontWeight": "400"}],
                    "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                    "label-caps": ["12px", {"lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "700"}]
            }
          }
        }
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.fill {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md antialiased selection:bg-primary-container selection:text-on-primary-container">
<!-- Header suppressed as per Semantic Shell Mandate for Transactional/Onboarding screens -->
<main class="flex-grow flex flex-col items-center justify-center p-gutter relative overflow-hidden">
<!-- Subtle Background Elements -->
<div class="absolute inset-0 z-0 pointer-events-none flex justify-center items-center opacity-40">
<div class="w-[800px] h-[800px] bg-primary-fixed-dim rounded-full mix-blend-multiply filter blur-[100px] translate-x-1/4 translate-y-1/4"></div>
<div class="w-[600px] h-[600px] bg-secondary-fixed-dim rounded-full mix-blend-multiply filter blur-[80px] -translate-x-1/4 -translate-y-1/4"></div>
</div>
<div class="z-10 w-full max-w-container-max mx-auto flex flex-col items-center">
<!-- Branding -->
<div class="mb-lg flex items-center gap-xs">
<span class="material-symbols-outlined text-primary text-h1 fill">hexagon</span>
<span class="font-display text-h2 text-on-background tracking-tighter">ProcurePing</span>
</div>
<!-- Page Titles -->
<div class="text-center mb-xl max-w-2xl">
<h1 class="font-h1 text-h1 text-on-background mb-xs">Join the Global Procurement Network</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">Choose how you want to use ProcurePing</p>
</div>
<!-- Role Selection Cards -->
<div class="grid grid-cols-1 md:grid-cols-3 gap-gutter w-full max-w-5xl">
<!-- Buyer Card -->
<button class="group flex flex-col text-left bg-surface-container-lowest border border-surface-variant rounded-xl p-md hover:border-primary hover:shadow-[0px_4px_12px_rgba(0,0,0,0.05)] transition-all duration-300 relative overflow-hidden h-full focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2">
<div class="absolute top-0 right-0 w-32 h-32 bg-primary-fixed rounded-bl-full -mr-16 -mt-16 transition-transform group-hover:scale-110 opacity-50 z-0"></div>
<div class="relative z-10 flex flex-col h-full">
<div class="w-12 h-12 rounded-full bg-surface-container flex items-center justify-center mb-sm group-hover:bg-primary-container transition-colors">
<span class="material-symbols-outlined text-on-background group-hover:text-on-primary-container text-[24px]">shopping_cart</span>
</div>
<h2 class="font-h3 text-h3 text-on-background mb-xs">I am a Buyer</h2>
<p class="font-body-sm text-body-sm text-on-surface-variant flex-grow">Post requests, receive offers, and secure deals.</p>
<div class="mt-sm flex items-center text-primary font-data-mono text-data-mono opacity-0 group-hover:opacity-100 transition-opacity translate-y-2 group-hover:translate-y-0 duration-300">
                            Continue as Buyer <span class="material-symbols-outlined ml-xs text-[16px]">arrow_forward</span>
</div>
</div>
</button>
<!-- Supplier Card -->
<button class="group flex flex-col text-left bg-surface-container-lowest border border-surface-variant rounded-xl p-md hover:border-secondary hover:shadow-[0px_4px_12px_rgba(0,0,0,0.05)] transition-all duration-300 relative overflow-hidden h-full focus:outline-none focus:ring-2 focus:ring-secondary focus:ring-offset-2">
<div class="absolute top-0 right-0 w-32 h-32 bg-secondary-fixed rounded-bl-full -mr-16 -mt-16 transition-transform group-hover:scale-110 opacity-50 z-0"></div>
<div class="relative z-10 flex flex-col h-full">
<div class="w-12 h-12 rounded-full bg-surface-container flex items-center justify-center mb-sm group-hover:bg-secondary-container transition-colors">
<span class="material-symbols-outlined text-on-background group-hover:text-on-secondary-container text-[24px]">local_shipping</span>
</div>
<h2 class="font-h3 text-h3 text-on-background mb-xs">I am a Supplier</h2>
<p class="font-body-sm text-body-sm text-on-surface-variant flex-grow">Receive pings, quote on requests, and grow your business.</p>
<div class="mt-sm flex items-center text-secondary font-data-mono text-data-mono opacity-0 group-hover:opacity-100 transition-opacity translate-y-2 group-hover:translate-y-0 duration-300">
                            Continue as Supplier <span class="material-symbols-outlined ml-xs text-[16px]">arrow_forward</span>
</div>
</div>
</button>
<!-- Admin Card (Disabled) -->
<div class="flex flex-col text-left bg-surface-container-low border border-surface-variant border-dashed rounded-xl p-md relative overflow-hidden h-full opacity-60 cursor-not-allowed">
<div class="relative z-10 flex flex-col h-full">
<div class="flex justify-between items-start mb-sm">
<div class="w-12 h-12 rounded-full bg-surface-dim flex items-center justify-center">
<span class="material-symbols-outlined text-on-surface-variant text-[24px]">admin_panel_settings</span>
</div>
<span class="font-label-caps text-label-caps bg-surface-container-highest text-on-surface-variant px-2 py-1 rounded">INVITE ONLY</span>
</div>
<h2 class="font-h3 text-h3 text-on-surface-variant mb-xs">Platform Staff</h2>
<p class="font-body-sm text-body-sm text-on-surface-variant flex-grow">Invite only for authorized personnel.</p>
<div class="mt-sm flex items-center text-on-surface-variant font-data-mono text-data-mono">
<span class="material-symbols-outlined mr-xs text-[16px]">lock</span> Secured Access
                        </div>
</div>
</div>
</div>
<!-- Login Link -->
<div class="mt-lg">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                    Already have an account? 
                    <a class="text-primary hover:underline font-data-mono text-data-mono ml-base" href="#">Log in here</a>
</p>
</div>
</div>
</main>
<!-- Footer suppressed as per Semantic Shell Mandate for Transactional/Onboarding screens -->
</body></html>
