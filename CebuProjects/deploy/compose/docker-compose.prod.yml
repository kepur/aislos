services:
  postgres:
    image: postgres:16-alpine
    container_name: procureping-postgres
    restart: unless-stopped
    env_file:
      - ${PROJECT_ROOT:-/opt/cebuproject}/.env.prod
    volumes:
      - ${PROJECT_ROOT:-/opt/cebuproject}/data/postgres:/var/lib/postgresql/data
      - ${PROJECT_ROOT:-/opt/cebuproject}/deploy/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - app_net

  backend:
    build:
      context: ${PROJECT_ROOT:-/opt/cebuproject}/backend
    container_name: procureping-backend
    restart: unless-stopped
    env_file:
      - ${PROJECT_ROOT:-/opt/cebuproject}/.env.prod
    environment:
      UPLOAD_DIR: /data/uploads
      PYTHONPATH: /app
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8003:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ${PROJECT_ROOT:-/opt/cebuproject}/data/uploads:/data/uploads
    networks:
      - app_net

  pc:
    build:
      context: ${PROJECT_ROOT:-/opt/cebuproject}/pc-frontend
    container_name: procureping-pc
    restart: unless-stopped
    env_file:
      - ${PROJECT_ROOT:-/opt/cebuproject}/.env.prod
    environment:
      PORT: 3001
    depends_on:
      - backend
    ports:
      - "3001:3001"
    networks:
      - app_net

  h5:
    build:
      context: ${PROJECT_ROOT:-/opt/cebuproject}/h5-frontend
    container_name: procureping-h5
    restart: unless-stopped
    env_file:
      - ${PROJECT_ROOT:-/opt/cebuproject}/.env.prod
    environment:
      PORT: 3002
    depends_on:
      - backend
    ports:
      - "3002:3002"
    networks:
      - app_net

  admin:
    build:
      context: ${PROJECT_ROOT:-/opt/cebuproject}/admin-frontend
      dockerfile: ${PROJECT_ROOT:-/opt/cebuproject}/deploy/docker/admin-frontend.Dockerfile
    container_name: procureping-admin
    restart: unless-stopped
    depends_on:
      - admin-backend
    ports:
      - "8082:80"
    networks:
      - app_net

  admin-backend:
    build:
      context: ${PROJECT_ROOT:-/opt/cebuproject}
      dockerfile: ${PROJECT_ROOT:-/opt/cebuproject}/admin-backend/Dockerfile
    container_name: procureping-admin-backend
    restart: unless-stopped
    env_file:
      - ${PROJECT_ROOT:-/opt/cebuproject}/.env.prod
    depends_on:
      backend:
        condition: service_started
    networks:
      - app_net

  edge:
    image: nginx:1.27-alpine
    container_name: procureping-edge
    restart: unless-stopped
    depends_on:
      - pc
      - h5
      - admin
      - admin-backend
      - backend
    ports:
      - "8083:80"
    volumes:
      - ${PROJECT_ROOT:-/opt/cebuproject}/deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ${PROJECT_ROOT:-/opt/cebuproject}/deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      - ${PROJECT_ROOT:-/opt/cebuproject}/data/uploads:/opt/cebuproject/data/uploads:ro
    networks:
      - app_net

networks:
  app_net:
    driver: bridge
