# Detect mobile user agents for root domain split routing.
map $http_user_agent $frontend_upstream {
  default http://pc_upstream;
  ~*(android|webos|iphone|ipad|ipod|blackberry|iemobile|opera\ mini|mobile) http://h5_upstream;
}

upstream backend_upstream {
  server backend:8000;
}

upstream pc_upstream {
  server pc:3001;
}

upstream h5_upstream {
  server h5:3002;
}

upstream admin_backend_upstream {
  server admin-backend:8010;
}

upstream admin_upstream {
  server admin:80;
}

server {
  listen 80;
  server_name sanaoll.com www.sanaoll.com;

  client_max_body_size 50m;

  location /api/ {
    proxy_pass http://backend_upstream/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /static/uploads/ {
    proxy_pass http://backend_upstream/static/uploads/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    proxy_pass $frontend_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

server {
  listen 80;
  server_name manager.sanaoll.com;

  client_max_body_size 50m;

  location /api/ {
    proxy_pass http://admin_backend_upstream/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /static/uploads/ {
    proxy_pass http://backend_upstream/static/uploads/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    proxy_pass http://admin_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
